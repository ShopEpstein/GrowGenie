<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FudFun.xyz — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#04050a;--bg2:#09090f;--bg3:#0f1018;--bg4:#141622;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);--border3:rgba(255,255,255,.22);
  --text:#F0F1FA;--dim:#7A7D96;--dim2:#4a4d62;
  --red:#FF3D00;--orange:#FF8C00;--gold:#FFD700;--neon:#00FF87;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Space Grotesk',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 2px);
}
a{color:inherit;text-decoration:none}

/* ── TOP BAR ─────────────────── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(4,5,10,.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
  height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;
}
.back-link{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;color:var(--dim);
  transition:color .13s;white-space:nowrap;
}
.back-link:hover{color:var(--text)}
.back-link svg{flex-shrink:0}
.logo{
  font-family:'Space Grotesk';font-weight:800;font-size:17px;letter-spacing:-.03em;
  text-shadow:0 0 20px rgba(255,61,0,.6);color:#fff;margin-left:auto;
}

/* ── MAIN ─────────────────── */
.main{max-width:900px;margin:0 auto;padding:28px 16px 80px}

/* ── PROFILE HEADER ─────────── */
.profile-header{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:24px;margin-bottom:20px;
}
.profile-avatar{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;flex-shrink:0;
  border:3px solid rgba(255,255,255,.12);
}
.profile-hater-name{
  font-family:'Space Mono';font-size:11px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--dim);margin-top:5px;margin-bottom:14px;
  background:var(--bg3);border:1px solid var(--border);border-radius:99px;
  padding:3px 10px;width:fit-content;
}
.profile-top{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.profile-info{flex:1;min-width:0}
.profile-username{
  font-size:20px;font-weight:800;letter-spacing:-.02em;
  color:var(--text);margin-bottom:4px;
}
.profile-xhandle{
  font-size:13px;color:var(--dim);margin-bottom:10px;
}
.profile-xhandle a{color:var(--red);transition:opacity .13s}
.profile-xhandle a:hover{opacity:.8}
.wallet-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wallet-addr{
  font-family:'Space Mono';font-size:13px;color:var(--dim);
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:5px 10px;
}
.copy-btn{
  display:flex;align-items:center;gap:5px;
  font-family:'Space Mono';font-size:11px;font-weight:700;
  padding:5px 10px;border:1px solid var(--border2);border-radius:8px;
  background:transparent;color:var(--dim);cursor:pointer;
  transition:all .13s;white-space:nowrap;
}
.copy-btn:hover{border-color:var(--border3);color:var(--text)}
.copy-btn.copied{border-color:rgba(0,255,135,.4);color:var(--neon)}

/* ── STATS ROW ─────────────── */
.stats-row{
  display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;
}
.stat-card{
  flex:1;min-width:120px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;
}
.stat-label{font-size:11px;color:var(--dim);font-family:'Space Mono';letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.stat-value.accent{color:var(--red)}

/* ── SECTION ─────────────── */
.section{margin-bottom:32px}
.section-title{
  font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--dim);font-family:'Space Mono';
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.section-count{
  background:var(--bg3);border:1px solid var(--border);border-radius:99px;
  font-size:10px;padding:2px 8px;color:var(--dim2);
}

/* ── SKELETON ─────────────── */
.skel{
  border-radius:var(--r);background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s linear infinite;
}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.skel-header{height:100px;margin-bottom:20px}
.skel-stat{height:80px;flex:1;min-width:120px;border-radius:var(--r)}
.skel-card{height:220px}

/* ── CAMPAIGN GRID ─────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
@media(max-width:540px){.grid{grid-template-columns:1fr 1fr;gap:8px}}
@media(max-width:360px){.grid{grid-template-columns:1fr}}

/* ── CAMPAIGN CARD ─────────── */
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;display:flex;flex-direction:column;cursor:pointer;
  transition:border-color .15s,transform .15s,box-shadow .15s;
}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 14px 40px -14px rgba(0,0,0,.8)}
.card-banner{height:110px;position:relative;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#1a0600,#08000f)}
.card-banner img{width:100%;height:100%;object-fit:cover;opacity:.7}
.card-banner-grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,.7) 100%)}
.card-age{
  position:absolute;top:8px;right:8px;
  font-family:'Space Mono';font-size:9px;color:var(--dim);
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  padding:2px 7px;border-radius:99px;border:1px solid rgba(255,255,255,.06);
}
.card-body{padding:22px 12px 0;flex:1;display:flex;flex-direction:column;gap:4px}
.card-name{
  font-family:'Space Grotesk';font-weight:700;font-size:14px;
  color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-why{font-size:12px;color:var(--dim);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;flex:1}
.card-footer{display:flex;align-items:center;gap:4px;padding:10px 12px 12px;flex-wrap:wrap}
.react-pill{
  background:var(--bg3);border:1px solid var(--border);border-radius:99px;
  font-size:11px;padding:3px 8px;color:var(--dim);font-family:'Space Mono';
  display:flex;align-items:center;gap:3px;
}
.bounty-pill{
  margin-left:auto;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);
  border-radius:99px;font-size:10px;padding:3px 8px;color:var(--gold);font-family:'Space Mono';
}

/* ── FUD POSTS LIST ─────────── */
.posts-list{display:flex;flex-direction:column;gap:8px}
.post-item{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;display:flex;align-items:flex-start;gap:12px;
  transition:border-color .13s;
}
.post-item:hover{border-color:var(--border2)}
.post-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.post-info{flex:1;min-width:0}
.post-campaign{
  font-size:12px;color:var(--dim);margin-bottom:4px;font-family:'Space Mono';
}
.post-campaign a{color:var(--red);transition:opacity .13s}
.post-campaign a:hover{opacity:.8}
.post-tweet{
  font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:2px;
}
.post-tweet a{color:var(--text);transition:opacity .13s}
.post-tweet a:hover{opacity:.7}
.post-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.post-age{font-family:'Space Mono';font-size:10px;color:var(--dim2)}
.post-tips{
  font-family:'Space Mono';font-size:10px;color:var(--gold);
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.15);
  border-radius:99px;padding:1px 7px;
}

/* ── EMPTY STATE ─────────────── */
.empty{
  text-align:center;padding:40px 20px;
  color:var(--dim);font-size:14px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
}
.empty-icon{font-size:32px;margin-bottom:10px}

/* ── NOT FOUND ─────────────── */
.not-found{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:14px;text-align:center;padding:40px 20px;
}
.not-found-icon{font-size:48px}
.not-found h2{font-size:22px;font-weight:700}
.not-found p{color:var(--dim);font-size:14px;max-width:300px;line-height:1.6}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-link" href="index.html">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to feed
  </a>
  <a class="logo" href="index.html">FudFun.xyz</a>
</div>

<div class="main" id="app">
  <!-- content injected by JS -->
</div>

<script type="module">
import { Client, Databases, Query } from 'https://cdn.jsdelivr.net/npm/appwrite@17/dist/esm/sdk.js';

const APP_ENDPOINT = 'https://nyc.cloud.appwrite.io/v1';
const APP_PROJECT  = '6a2bc15c00065b3c91a0';
const DB_ID        = 'growthgenie';
const COL_CAMPAIGNS = 'campaigns';
const COL_POSTS     = 'fud_posts';

const app = document.getElementById('app');

/* ── Player Hater's Ball avatars ── */
const PLAYER_HATERS = [
  { name:'Silky Johnson',    emoji:'🎩', g:'#1a0030,#3d0066' },
  { name:'Beautiful',        emoji:'💅', g:'#001430,#003566' },
  { name:'Ice Cold',         emoji:'🧊', g:'#001a2a,#004466' },
  { name:'Pit Bull',         emoji:'🦴', g:'#1e0000,#660000' },
  { name:'Buc Nasty',        emoji:'🦅', g:'#001a00,#004400' },
  { name:'Pee Wee',          emoji:'🎯', g:'#1a1000,#553300' },
  { name:'The Dark Crusader',emoji:'🦇', g:'#0d0d0d,#222233' },
  { name:'Sweetness',        emoji:'🍭', g:'#1a001a,#440044' },
];
function haterIdx(key) {
  if (!key) return 0;
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;
  return h % PLAYER_HATERS.length;
}
function haterAvatar(key, size = 72) {
  const ph = PLAYER_HATERS[haterIdx(key)];
  const fs = Math.round(size * 0.48);
  return `<div class="profile-avatar" style="background:linear-gradient(135deg,${ph.g});font-size:${fs}px;width:${size}px;height:${size}px">${ph.emoji}</div>`;
}
function haterSmall(key, size = 28) {
  const ph = PLAYER_HATERS[haterIdx(key)];
  const fs = Math.round(size * 0.5);
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(135deg,${ph.g});font-size:${fs}px;flex-shrink:0;border:2px solid rgba(255,255,255,.1)">${ph.emoji}</span>`;
}

/* ── helpers ── */
function trunc(wallet) {
  if (!wallet || wallet.length < 10) return wallet || '';
  return wallet.slice(0, 4) + '…' + wallet.slice(-4);
}

function timeAgo(iso) {
  const d = new Date(iso), now = Date.now(), diff = now - d.getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const dy = Math.floor(h / 24);
  if (dy < 30) return dy + 'd ago';
  return d.toLocaleDateString();
}

function fmtSol(lamports) {
  if (!lamports || lamports === 0) return null;
  const sol = lamports / 1e9;
  return sol >= 1 ? sol.toFixed(2) + ' SOL' : (sol * 1000).toFixed(1) + 'm';
}

/* ── read wallet from query string ── */
const params = new URLSearchParams(location.search);
const wallet = (params.get('w') || '').trim();

if (!wallet) {
  app.innerHTML = `
    <div class="not-found">
      <div class="not-found-icon">🔍</div>
      <h2>Profile not found</h2>
      <p>No wallet address supplied. Try opening a profile link from a campaign page.</p>
      <a href="index.html" style="margin-top:8px;color:var(--red);font-size:14px;font-weight:700">← Go to feed</a>
    </div>`;
} else {
  /* ── show skeletons ── */
  app.innerHTML = `
    <div class="skel skel-header" style="margin-bottom:20px"></div>
    <div class="stats-row" style="margin-bottom:24px">
      <div class="skel skel-stat"></div>
      <div class="skel skel-stat"></div>
      <div class="skel skel-stat"></div>
    </div>
    <div class="grid">
      ${[1,2,3].map(() => `<div class="skel skel-card"></div>`).join('')}
    </div>`;

  /* ── appwrite ── */
  const client = new Client().setEndpoint(APP_ENDPOINT).setProject(APP_PROJECT);
  const db = new Databases(client);

  /* ── read local profile ── */
  let localProfile = null;
  try {
    const raw = localStorage.getItem('fud_profile');
    if (raw) {
      const p = JSON.parse(raw);
      if (p && p.wallet === wallet) localProfile = p;
    }
  } catch(_) {}

  /* ── fetch campaigns + posts in parallel ── */
  let campaigns = [], posts = [];
  try {
    const [campRes, postsRes] = await Promise.all([
      db.listDocuments(DB_ID, COL_CAMPAIGNS, [
        Query.equal('clientId', wallet),
        Query.orderDesc('$createdAt'),
        Query.limit(50),
      ]),
      db.listDocuments(DB_ID, COL_POSTS, [
        Query.equal('wallet', wallet),
        Query.orderDesc('$createdAt'),
        Query.limit(50),
      ]),
    ]);
    campaigns = campRes.documents || [];
    posts     = postsRes.documents || [];
  } catch(err) {
    console.error('Appwrite fetch error', err);
  }

  /* ── compute stats ── */
  const totalReactions = campaigns.reduce((sum, c) =>
    sum + (c.reactFire || 0) + (c.reactSkull || 0) + (c.reactLaugh || 0), 0);

  /* ── player hater identity ── */
  const ph = PLAYER_HATERS[haterIdx(wallet)];

  /* ── build html ── */
  const profileHeaderHtml = `
    <div class="profile-header">
      <div class="profile-top">
        <div>
          ${haterAvatar(wallet, 72)}
          <div class="profile-hater-name">${ph.emoji} ${ph.name}</div>
        </div>
        <div class="profile-info">
          ${localProfile?.username ? `<div class="profile-username">@${localProfile.username}</div>` : `<div class="profile-username">${ph.name}</div>`}
          ${localProfile?.xhandle ? `<div class="profile-xhandle">On X: <a href="https://x.com/${localProfile.xhandle.replace(/^@/,'')}" target="_blank" rel="noopener">@${localProfile.xhandle.replace(/^@/,'')}</a></div>` : ''}
          <div class="wallet-row">
            <div class="wallet-addr" id="wallet-display">${trunc(wallet)}</div>
            <button class="copy-btn" id="copy-btn" title="Copy wallet address">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Copy
            </button>
          </div>
        </div>
      </div>
    </div>`;

  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Campaigns</div>
        <div class="stat-value accent">${campaigns.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">FUD Posts</div>
        <div class="stat-value">${posts.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Reactions</div>
        <div class="stat-value">${totalReactions.toLocaleString()}</div>
      </div>
    </div>`;

  const campaignsHtml = `
    <div class="section">
      <div class="section-title">
        Campaigns launched
        <span class="section-count">${campaigns.length}</span>
      </div>
      ${campaigns.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">🚀</div>
          <div>No campaigns launched yet</div>
        </div>` : `
      <div class="grid">
        ${campaigns.map(c => {
          const reactions = (c.reactFire||0) + (c.reactSkull||0) + (c.reactLaugh||0);
          const bounty = fmtSol(c.bountyPool);
          const img = c.bannerUrl || c.socialPreviewThumb;
          return `
          <div class="card" onclick="location.href='/campaign.html?c=${c.$id}'">
            <div class="card-banner">
              ${img ? `<img src="${img}" alt="" loading="lazy" onerror="this.style.display='none'"/>` : ''}
              <div class="card-banner-grad"></div>
              <div class="card-age">${timeAgo(c.$createdAt)}</div>
            </div>
            <div class="card-body">
              <div class="card-name">${escHtml(c.projectName || c.fudTarget || 'Untitled')}</div>
              ${c.tag ? `<div class="card-why">${escHtml(c.tag)}</div>` : ''}
            </div>
            <div class="card-footer">
              <div class="react-pill">🔥 ${(c.reactFire||0).toLocaleString()}</div>
              <div class="react-pill">💀 ${(c.reactSkull||0).toLocaleString()}</div>
              <div class="react-pill">😂 ${(c.reactLaugh||0).toLocaleString()}</div>
              ${bounty ? `<div class="bounty-pill">💰 ${bounty}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>`;

  const postsHtml = `
    <div class="section">
      <div class="section-title">
        FUD posts fired
        <span class="section-count">${posts.length}</span>
      </div>
      ${posts.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">📭</div>
          <div>No FUD posts yet</div>
        </div>` : `
      <div class="posts-list">
        ${posts.map(p => {
          const tips = fmtSol(p.tipsReceived);
          return `
          <div class="post-item">
            <div class="post-icon">💬</div>
            <div class="post-info">
              <div class="post-campaign">
                Campaign: <a href="/campaign.html?c=${p.campaignId}" onclick="event.stopPropagation()">${escHtml(p.campaignId || '—')}</a>
              </div>
              ${p.tweetUrl ? `<div class="post-tweet"><a href="${escHtml(p.tweetUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escHtml(p.tweetUrl)}</a></div>` : ''}
              <div class="post-meta">
                <span class="post-age">${timeAgo(p.$createdAt)}</span>
                ${tips ? `<span class="post-tips">💰 ${tips} earned</span>` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>`;

  app.innerHTML = profileHeaderHtml + statsHtml + campaignsHtml + postsHtml;

  /* ── copy button ── */
  document.getElementById('copy-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(wallet).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Copy`;
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      /* fallback for browsers without clipboard API */
      const el = document.createElement('textarea');
      el.value = wallet;
      el.style.position = 'fixed';
      el.style.opacity = '0';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Copy`;
        btn.classList.remove('copied');
      }, 2000);
    });
  });
}

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
