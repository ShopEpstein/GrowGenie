<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — FudFun.xyz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0B0C13;
      --ink-2: #101220;
      --ink-3: #171a2b;
      --line: rgba(255,255,255,.08);
      --line-2: rgba(255,255,255,.14);
      --text: #ECEDF5;
      --dim: #8A8DA3;
      --dim-2: #5d6075;
      --accent: #FF3D00;
      --accent-2: #FF9100;
      --admin: #FF3D3D;
      --good: #2BD576;
      --bad: #FF5C5C;
      --warn: #FFC53D;
      --r: 14px;
      --r-sm: 9px;
    }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* spinner overlay */
    #auth-gate {
      position: fixed; inset: 0; background: var(--ink);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--admin);
      border-radius: 50%; animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* topbar */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,12,19,.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,61,61,.2);
      height: 58px; padding: 0 24px;
      display: flex; align-items: center; gap: 16px;
    }

    .topbar-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 17px;
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--text);
    }

    .admin-badge {
      background: var(--admin);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 9px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 3px 7px; border-radius: 4px;
    }

    .topbar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 12px;
    }

    .user-pill {
      font-size: 12px; color: var(--dim);
      background: var(--ink-3); border: 1px solid var(--line-2);
      border-radius: 100px; padding: 5px 12px;
    }

    .btn-sm {
      font-size: 12px; padding: 6px 14px;
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      background: transparent; color: var(--dim);
      cursor: pointer; transition: color .15s, border-color .15s;
      text-decoration: none;
    }
    .btn-sm:hover { color: var(--text); }

    /* page body */
    .page { padding: 32px 24px 80px; max-width: 1200px; margin: 0 auto; }

    /* stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--ink-2); border: 1px solid var(--line);
      border-radius: var(--r); padding: 20px;
    }

    .stat-card .label {
      font-family: 'Space Mono', monospace;
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 8px;
    }

    .stat-card .value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px; font-weight: 700;
      color: var(--text); line-height: 1;
    }

    .stat-card .value.good { color: var(--good); }
    .stat-card .value.bad  { color: var(--bad); }

    /* tabs */
    .tabs {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
    }

    .tab {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600;
      padding: 10px 18px;
      border: none; background: transparent;
      color: var(--dim); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s;
    }

    .tab.active { color: var(--text); border-bottom-color: var(--admin); }
    .tab:hover:not(.active) { color: var(--text); }

    /* panel */
    .panel { display: none; }
    .panel.active { display: block; }

    /* table */
    .table-wrap {
      background: var(--ink-2); border: 1px solid var(--line);
      border-radius: var(--r); overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-family: 'Space Mono', monospace;
      font-size: 10px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--dim); text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--ink-3);
    }

    tbody tr {
      border-bottom: 1px solid var(--line);
      transition: background .1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,.025); }

    tbody td {
      padding: 12px 16px;
      font-size: 13px;
      vertical-align: middle;
    }

    .td-name { font-weight: 500; color: var(--text); max-width: 200px; }
    .td-name span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-dim { color: var(--dim); font-size: 12px; }
    .td-mono { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--dim); }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 9px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 4px;
    }

    .badge-active { background: rgba(43,213,118,.15); color: var(--good); }
    .badge-inactive { background: rgba(255,255,255,.06); color: var(--dim); }
    .badge-banned { background: rgba(255,92,92,.15); color: var(--bad); }
    .badge-admin { background: rgba(255,61,61,.2); color: var(--admin); }

    .cat-pill {
      font-size: 12px; white-space: nowrap;
    }

    /* action buttons */
    .action-btns { display: flex; gap: 6px; }

    .btn-action {
      font-size: 11px; padding: 4px 10px;
      border-radius: 6px; border: 1px solid;
      cursor: pointer; font-weight: 600;
      transition: opacity .15s, transform .1s;
      background: transparent;
      white-space: nowrap;
    }
    .btn-action:hover { opacity: .8; transform: translateY(-1px); }
    .btn-action:active { transform: translateY(0); }

    .btn-delete {
      color: var(--bad);
      border-color: rgba(255,92,92,.3);
    }
    .btn-delete:hover { background: rgba(255,92,92,.1); }

    .btn-toggle {
      color: var(--warn);
      border-color: rgba(255,197,61,.3);
    }
    .btn-toggle:hover { background: rgba(255,197,61,.1); }

    .btn-ban {
      color: var(--bad);
      border-color: rgba(255,92,92,.3);
    }
    .btn-ban:hover { background: rgba(255,92,92,.1); }

    .btn-unban {
      color: var(--good);
      border-color: rgba(43,213,118,.3);
    }
    .btn-unban:hover { background: rgba(43,213,118,.1); }

    /* empty state */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--dim); font-size: 14px;
    }

    .empty .icon { font-size: 36px; margin-bottom: 12px; }

    /* loading row */
    .loading-row td {
      text-align: center; padding: 40px;
      color: var(--dim); font-size: 13px;
    }

    /* toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--ink-3); border: 1px solid var(--line-2);
      border-radius: var(--r-sm); padding: 12px 18px;
      font-size: 13px; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      transform: translateY(20px); opacity: 0;
      transition: transform .2s, opacity .2s;
      pointer-events: none; z-index: 200;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok  { border-color: rgba(43,213,118,.4); color: var(--good); }
    #toast.err { border-color: rgba(255,92,92,.4);  color: var(--bad); }

    /* confirm dialog */
    #confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
      z-index: 500; align-items: center; justify-content: center;
      padding: 20px;
    }
    #confirm-overlay.visible { display: flex; }

    .confirm-card {
      background: var(--ink-2); border: 1px solid var(--line-2);
      border-radius: var(--r); padding: 28px 28px 24px;
      max-width: 380px; width: 100%;
    }
    .confirm-card h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px; font-weight: 700; margin-bottom: 8px;
    }
    .confirm-card p { font-size: 13px; color: var(--dim); margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-btns button {
      flex: 1; padding: 10px; border-radius: var(--r-sm);
      border: 1px solid var(--line-2);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .confirm-btns button:hover { opacity: .85; }
    #confirm-yes {
      background: var(--bad); border-color: var(--bad); color: #fff;
    }
    #confirm-no {
      background: transparent; color: var(--dim);
    }

    @media (max-width: 640px) {
      .page { padding: 20px 12px 60px; }
      thead th, tbody td { padding: 10px 10px; }
      .topbar { padding: 0 12px; }
    }
  </style>
</head>
<body>

<div id="auth-gate"><div class="spinner"></div></div>

<!-- toast -->
<div id="toast"></div>

<!-- confirm dialog -->
<div id="confirm-overlay">
  <div class="confirm-card">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button id="confirm-yes">Confirm</button>
      <button id="confirm-no">Cancel</button>
    </div>
  </div>
</div>

<!-- topbar -->
<header class="topbar">
  <a href="/" class="topbar-brand">
    💀 FudFun.xyz
    <span class="admin-badge">Admin</span>
  </a>
  <div class="topbar-right">
    <span class="user-pill" id="user-email">…</span>
    <a href="fud.html" class="btn-sm">← Feed</a>
    <button class="btn-sm" id="sign-out-btn">Sign out</button>
  </div>
</header>

<!-- page -->
<main class="page">

  <!-- stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="label">Total Campaigns</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Active Campaigns</div>
      <div class="value good" id="stat-active">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Total Users</div>
      <div class="value" id="stat-users">—</div>
    </div>
  </div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="campaigns">Campaigns</button>
    <button class="tab" data-tab="users">Users</button>
  </div>

  <!-- campaigns panel -->
  <div class="panel active" id="panel-campaigns">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Target</th>
            <th>Category</th>
            <th>Creator</th>
            <th>Status</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="campaigns-body">
          <tr class="loading-row"><td colspan="6">Loading campaigns…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- users panel -->
  <div class="panel" id="panel-users">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name / Email</th>
            <th>Labels</th>
            <th>Status</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr class="loading-row"><td colspan="5">Loading users…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script type="module">
  import { Client, Account } from 'https://cdn.jsdelivr.net/npm/appwrite@17/dist/esm/sdk.js';

  const client = new Client()
    .setEndpoint('https://nyc.cloud.appwrite.io/v1')
    .setProject('6a2bc15c00065b3c91a0');

  const account = new Account(client);

  const CAT_LABELS = {
    ex:'💔 Ex', boss:'😤 Boss', family:'👴 Family', hate:'🔥 Hate',
    profit:'💰 Profit', boredom:'😴 Boredom', fun:'😂 Fun', coin:'🎯 Coin',
  };

  let currentJWT = null;

  // ── Auth gate ───────────────────────────────────────────────────
  (async () => {
    let user;
    try {
      user = await account.get();
    } catch {
      window.location.replace('login.html');
      return;
    }

    if (!user.labels?.includes('admin')) {
      document.getElementById('auth-gate').innerHTML =
        '<div style="text-align:center;"><div style="font-size:48px;">🚫</div>' +
        '<p style="color:#8A8DA3;margin-top:12px;font-family:Inter,sans-serif;">Not an admin account.</p>' +
        '<a href="fud.html" style="color:#FF3D00;font-size:13px;text-decoration:none;">← Back to feed</a></div>';
      return;
    }

    document.getElementById('user-email').textContent = user.email;
    currentJWT = await account.createJWT().then(r => r.jwt);
    document.getElementById('auth-gate').style.display = 'none';

    loadStats();
    loadCampaigns();
  })();

  // ── Sign out ────────────────────────────────────────────────────
  document.getElementById('sign-out-btn').addEventListener('click', async () => {
    await account.deleteSession('current').catch(() => {});
    window.location.href = 'login.html';
  });

  // ── Tabs ────────────────────────────────────────────────────────
  let usersLoaded = false;
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      const name = tab.dataset.tab;
      document.getElementById(`panel-${name}`).classList.add('active');
      if (name === 'users' && !usersLoaded) { usersLoaded = true; loadUsers(); }
    });
  });

  // ── API helper ──────────────────────────────────────────────────
  async function api(method, params) {
    const headers = { 'Authorization': `Bearer ${currentJWT}` };
    let resp;
    if (method === 'GET') {
      const qs = new URLSearchParams(params).toString();
      resp = await fetch(`/api/admin?${qs}`, { headers });
    } else {
      headers['Content-Type'] = 'application/json';
      resp = await fetch('/api/admin', {
        method: 'POST', headers, body: JSON.stringify(params),
      });
    }
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'API error');
    return data;
  }

  // ── Toast ────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }

  // ── Confirm dialog ───────────────────────────────────────────────
  function confirm(title, msg) {
    return new Promise(resolve => {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-msg').textContent = msg;
      const overlay = document.getElementById('confirm-overlay');
      overlay.classList.add('visible');

      function cleanup(result) {
        overlay.classList.remove('visible');
        document.getElementById('confirm-yes').removeEventListener('click', onYes);
        document.getElementById('confirm-no').removeEventListener('click', onNo);
        resolve(result);
      }

      const onYes = () => cleanup(true);
      const onNo  = () => cleanup(false);
      document.getElementById('confirm-yes').addEventListener('click', onYes);
      document.getElementById('confirm-no').addEventListener('click', onNo);
    });
  }

  // ── Stats ────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const data = await api('GET', { action: 'stats' });
      document.getElementById('stat-total').textContent  = data.totalCampaigns;
      document.getElementById('stat-active').textContent = data.activeCampaigns;
      document.getElementById('stat-users').textContent  = data.totalUsers;
    } catch (e) {
      console.error(e);
    }
  }

  // ── Campaigns ────────────────────────────────────────────────────
  async function loadCampaigns() {
    const tbody = document.getElementById('campaigns-body');
    try {
      const data = await api('GET', { action: 'campaigns' });
      if (!data.documents?.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty"><div class="icon">💀</div>No campaigns yet.</div></td></tr>';
        return;
      }
      tbody.innerHTML = data.documents.map(c => {
        const cat = c.fudCategory || c.campaignType || '—';
        const catLabel = CAT_LABELS[cat] || cat;
        const status = c.active ? '<span class="badge badge-active">Active</span>' : '<span class="badge badge-inactive">Inactive</span>';
        const date = c.$createdAt ? new Date(c.$createdAt).toLocaleDateString() : '—';
        return `<tr data-id="${esc(c.$id)}">
          <td class="td-name"><span title="${esc(c.fudTarget||c.projectName||'')}">${esc(c.fudTarget||c.projectName||'—')}</span>
            ${c.slug ? `<span class="td-dim">/c/${esc(c.slug)}</span>` : ''}
          </td>
          <td class="cat-pill">${esc(catLabel)}</td>
          <td class="td-mono">${esc((c.clientId||'').slice(0,10))}…</td>
          <td>${status}</td>
          <td class="td-dim">${date}</td>
          <td>
            <div class="action-btns">
              <button class="btn-action btn-toggle" onclick="toggleCampaign('${esc(c.$id)}', ${c.active})">${c.active ? 'Deactivate' : 'Activate'}</button>
              <button class="btn-action btn-delete" onclick="deleteCampaign('${esc(c.$id)}', '${esc(c.fudTarget||c.projectName||'')}')">Delete</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    } catch (e) {
      tbody.innerHTML = `<tr class="loading-row"><td colspan="6">Error: ${esc(e.message)}</td></tr>`;
    }
  }

  window.toggleCampaign = async (id, currentActive) => {
    const ok = await confirm(
      currentActive ? 'Deactivate campaign?' : 'Activate campaign?',
      currentActive ? 'This will hide the campaign from the public feed.' : 'This will make the campaign visible on the feed.'
    );
    if (!ok) return;
    try {
      const r = await api('POST', { action: 'toggle-campaign', campaignId: id });
      toast(`Campaign ${r.active ? 'activated' : 'deactivated'}`, 'ok');
      loadCampaigns();
      loadStats();
    } catch (e) {
      toast(`Error: ${e.message}`, 'err');
    }
  };

  window.deleteCampaign = async (id, name) => {
    const ok = await confirm(
      'Delete campaign?',
      `Permanently delete "${name}"? This cannot be undone.`
    );
    if (!ok) return;
    try {
      await api('POST', { action: 'delete-campaign', campaignId: id });
      toast('Campaign deleted', 'ok');
      loadCampaigns();
      loadStats();
    } catch (e) {
      toast(`Error: ${e.message}`, 'err');
    }
  };

  // ── Users ────────────────────────────────────────────────────────
  async function loadUsers() {
    const tbody = document.getElementById('users-body');
    try {
      const data = await api('GET', { action: 'users' });
      if (!data.users?.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty"><div class="icon">👤</div>No users found.</div></td></tr>';
        return;
      }
      tbody.innerHTML = data.users.map(u => {
        const labels = (u.labels || []).map(l =>
          `<span class="badge ${l === 'admin' ? 'badge-admin' : ''}">${esc(l)}</span>`
        ).join(' ') || '<span class="td-dim">—</span>';
        const status = u.status
          ? '<span class="badge badge-active">Active</span>'
          : '<span class="badge badge-banned">Banned</span>';
        const date = u.$createdAt ? new Date(u.$createdAt).toLocaleDateString() : '—';
        const isSelf = u.email === document.getElementById('user-email').textContent;
        return `<tr>
          <td class="td-name">
            <span>${esc(u.name||'(no name)')}</span>
            <span class="td-dim">${esc(u.email||'')}</span>
          </td>
          <td>${labels}</td>
          <td>${status}</td>
          <td class="td-dim">${date}</td>
          <td>
            ${isSelf ? '<span class="td-dim" style="font-size:11px;">You</span>' : u.status
              ? `<button class="btn-action btn-ban" onclick="banUser('${esc(u.$id)}', '${esc(u.email||'')}')">Ban</button>`
              : `<button class="btn-action btn-unban" onclick="unbanUser('${esc(u.$id)}', '${esc(u.email||'')}')">Unban</button>`
            }
          </td>
        </tr>`;
      }).join('');
    } catch (e) {
      tbody.innerHTML = `<tr class="loading-row"><td colspan="5">Error: ${esc(e.message)}</td></tr>`;
    }
  }

  window.banUser = async (id, email) => {
    const ok = await confirm('Ban user?', `Block ${email} from signing in. You can unban them later.`);
    if (!ok) return;
    try {
      await api('POST', { action: 'ban-user', userId: id });
      toast(`${email} has been banned`, 'ok');
      loadUsers();
      loadStats();
    } catch (e) {
      toast(`Error: ${e.message}`, 'err');
    }
  };

  window.unbanUser = async (id, email) => {
    const ok = await confirm('Unban user?', `Restore ${email}'s access.`);
    if (!ok) return;
    try {
      await api('POST', { action: 'unban-user', userId: id });
      toast(`${email} has been unbanned`, 'ok');
      loadUsers();
    } catch (e) {
      toast(`Error: ${e.message}`, 'err');
    }
  };

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
