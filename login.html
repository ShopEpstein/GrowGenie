<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="apple-touch-icon" href="/favicon.svg"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter — FudFun.xyz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #04050a; --ink-2: #09090f; --ink-3: #0f1018;
      --line: rgba(255,255,255,.06); --line-2: rgba(255,255,255,.12);
      --text: #F0F1FA; --dim: #7A7D96; --dim-2: #4a4d62;
      --red: #FF3D00; --orange: #FF8C00; --gold: #FFD700;
      --good: #00FF87; --bad: #FF5C5C; --r: 16px; --r-sm: 11px;
    }
    html, body { height: 100%; }
    body {
      background: var(--ink); color: var(--text);
      font-family: 'Inter', sans-serif;
      display: grid; place-items: center;
      min-height: 100vh; position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255,61,0,.14) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,140,0,.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 60% 30%, rgba(255,61,0,.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 2px);
    }
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: var(--ink-2); border: 1px solid var(--line-2);
      border-radius: var(--r); padding: 36px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,.9);
      margin: 24px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--dim); text-decoration: none;
      margin-bottom: 20px; transition: color .15s;
    }
    .back-link:hover { color: var(--text); }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
    .brand-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      display: grid; place-items: center; font-size: 24px; flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(255,61,0,.4);
    }
    .brand-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800; font-size: 22px; letter-spacing: -0.4px;
      text-shadow: 0 0 20px rgba(255,61,0,.5); color: var(--text);
    }
    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 24px; letter-spacing: -0.3px;
      color: var(--text); margin-bottom: 6px;
    }
    .card-subtitle { font-size: 13px; color: var(--dim); margin-bottom: 24px; font-weight: 400; line-height: 1.5; }
    .divider { height: 1px; background: var(--line); margin-bottom: 24px; }
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0; font-size: 11px; color: var(--dim-2);
      font-family: 'Space Mono', monospace; letter-spacing: 0.08em;
    }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    .field { margin-bottom: 15px; }
    .field label {
      display: block; font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dim); margin-bottom: 7px;
    }
    .field input {
      width: 100%; background: var(--ink-3);
      border: 1px solid var(--line-2); border-radius: var(--r-sm);
      padding: 11px 14px; font-family: 'Inter', sans-serif;
      font-size: 14px; color: var(--text); outline: none;
      transition: border-color .18s, box-shadow .18s; -webkit-appearance: none;
    }
    .field input::placeholder { color: var(--dim-2); }
    .field input:focus { border-color: rgba(255,61,0,.55); box-shadow: 0 0 0 3px rgba(255,61,0,.12); }
    .error-msg {
      display: none; background: rgba(255,92,92,.10); border: 1px solid rgba(255,92,92,.30);
      border-radius: var(--r-sm); padding: 11px 14px;
      font-size: 13px; color: var(--bad); margin-bottom: 14px; line-height: 1.45;
    }
    .error-msg.visible { display: block; }
    .success-msg {
      display: none; background: rgba(0,255,135,.08); border: 1px solid rgba(0,255,135,.25);
      border-radius: var(--r-sm); padding: 11px 14px;
      font-size: 13px; color: var(--good); margin-bottom: 14px; line-height: 1.45;
    }
    .success-msg.visible { display: block; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px 20px; border: none; border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--red) 0%, var(--orange) 100%);
      color: #fff; font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 15px; letter-spacing: .01em;
      cursor: pointer; transition: opacity .18s, transform .15s, box-shadow .18s;
      box-shadow: 0 4px 20px rgba(255,61,0,.35); margin-top: 4px;
    }
    .btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(255,61,0,.5); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--ink-3); border: 1px solid var(--line-2);
      box-shadow: none; color: var(--text);
    }
    .btn-secondary:hover:not(:disabled) { border-color: rgba(255,61,0,.4); box-shadow: 0 0 0 3px rgba(255,61,0,.08); }
    .btn-google {
      background: #fff; color: #3c4043; border: 1px solid #dadce0;
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    .btn-google:hover:not(:disabled) { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,.3); transform: translateY(-1px); }
    .btn-spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .65s linear infinite; flex-shrink: 0;
    }
    .btn-google .btn-spinner { border-color: rgba(0,0,0,.2); border-top-color: #3c4043; }
    .btn.loading .btn-spinner { display: block; }
    .btn.loading .btn-label { opacity: .7; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card-footer { margin-top: 18px; text-align: center; font-size: 12px; color: var(--dim-2); line-height: 1.6; }
    .redirect-overlay { display: none; position: fixed; inset: 0; background: var(--ink); z-index: 100; place-items: center; }
    .redirect-overlay.visible { display: grid; }
    .redirect-inner { text-align: center; }
    .redirect-inner p { color: var(--dim); font-size: 14px; margin-top: 12px; }
    .redirect-spinner { width: 32px; height: 32px; border: 3px solid var(--line-2); border-top-color: var(--red); border-radius: 50%; animation: spin .65s linear infinite; margin: 0 auto; }
    .mobile-deeplinks { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .deeplink-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 16px; border: 1px solid var(--line-2);
      border-radius: var(--r-sm); background: var(--ink-3);
      color: var(--text); font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600; text-decoration: none; transition: border-color .15s;
    }
    .deeplink-btn:hover { border-color: rgba(255,61,0,.4); }
    .wallet-detected { font-size: 12px; color: var(--dim); text-align: center; margin-top: 10px; font-family: 'Space Mono', monospace; }
    .auto-connect-msg { text-align: center; color: var(--dim); font-size: 13px; margin-bottom: 12px; }
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="redirect-overlay" id="redirectOverlay">
  <div class="redirect-inner">
    <div class="redirect-spinner"></div>
    <p>Entering the FUD zone…</p>
  </div>
</div>

<div class="card" id="authCard">
  <a href="/" class="back-link" id="backLink">← Back to feed</a>

  <div class="brand">
    <div class="brand-icon">💀</div>
    <span class="brand-wordmark" id="brandName">FudFun.xyz</span>
  </div>

  <div class="divider"></div>

  <h1 class="card-title">Enter 💀</h1>
  <p class="card-subtitle">No wallet? No problem. Sign in with Google or email.</p>

  <div class="error-msg" id="errorMsg" role="alert"></div>
  <div class="success-msg" id="successMsg"></div>

  <!-- Google OAuth -->
  <button type="button" class="btn btn-google" id="googleBtn">
    <div class="btn-spinner"></div>
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    <span class="btn-label">Continue with Google</span>
  </button>

  <div class="or-divider">or</div>

  <!-- Email magic link -->
  <div id="emailSection">
    <div class="field">
      <label for="emailInput">Email address</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <button type="button" class="btn btn-secondary" id="emailBtn">
      <div class="btn-spinner"></div>
      <span class="btn-label">📧 Send Magic Link</span>
    </button>
  </div>

  <div class="or-divider">or</div>

  <!-- Wallet sign-in -->
  <div id="autoConnectMsg" class="auto-connect-msg" style="display:none">Checking wallet…</div>
  <button type="button" class="btn btn-secondary" id="walletBtn">
    <div class="btn-spinner"></div>
    <span class="btn-label" id="walletBtnLabel">🔑 Connect Wallet</span>
  </button>
  <div class="wallet-detected" id="walletDetected"></div>
  <div id="mobileDeeplinks" style="display:none" class="mobile-deeplinks"></div>

  <div class="card-footer">
    By signing in you agree to spread FUD responsibly. No CSAM. No actual porn. Everything else goes.
  </div>
</div>

<script type="module">
import { Client, Account, ID } from 'https://cdn.jsdelivr.net/npm/appwrite@17/dist/esm/sdk.js';

const ENDPOINT = 'https://nyc.cloud.appwrite.io/v1';
const PROJECT  = '6a2bc15c00065b3c91a0';
const client   = new Client().setEndpoint(ENDPOINT).setProject(PROJECT);
const account  = new Account(client);

const params   = new URLSearchParams(location.search);
const nextUrl  = params.get('next') || '/';

// Update brand for smearfun.xyz
const IS_SMEAR = /smearfun\.xyz/i.test(location.hostname);
if (IS_SMEAR) {
  document.title = 'Enter — SmearFun.xyz';
  document.getElementById('brandName').textContent = 'SmearFun.xyz';
  document.getElementById('authCard').querySelector('.card-title').textContent = 'Enter ⭐';
  document.getElementById('authCard').querySelector('.card-subtitle').textContent = 'No wallet? No problem. Sign in with Google or email.';
  document.querySelector('.card-footer').textContent = 'By signing in you agree to spread political heat responsibly. No CSAM. No actual porn. Everything else goes.';
}

const redirectOverlay = document.getElementById('redirectOverlay');
const errorMsg        = document.getElementById('errorMsg');
const successMsg      = document.getElementById('successMsg');
const walletBtn       = document.getElementById('walletBtn');
const walletBtnLabel  = document.getElementById('walletBtnLabel');
const walletDetected  = document.getElementById('walletDetected');
const mobileDeeplinks = document.getElementById('mobileDeeplinks');
const autoConnectMsg  = document.getElementById('autoConnectMsg');
const googleBtn       = document.getElementById('googleBtn');
const emailBtn        = document.getElementById('emailBtn');
const emailInput      = document.getElementById('emailInput');

let walletInfo = null;

function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('visible'); successMsg.classList.remove('visible'); }
function showSuccess(msg) { successMsg.textContent = msg; successMsg.classList.add('visible'); errorMsg.classList.remove('visible'); }
function hideMessages() { errorMsg.classList.remove('visible'); successMsg.classList.remove('visible'); }
function redirectAfterAuth() { redirectOverlay.classList.add('visible'); window.location.href = nextUrl; }

function setLoading(btn, state, label) {
  btn.disabled = state;
  btn.classList.toggle('loading', state);
  if (label) btn.querySelector('.btn-label').textContent = label;
}

// ── Handle callbacks (OAuth token OR magic link) ───────────
// Both flows land here with ?userId=&secret= in the URL.
// We use sessionStorage to know which flow triggered the redirect.
const cbUserId = params.get('userId');
const cbSecret = params.get('secret');
if (cbUserId && cbSecret) {
  (async () => {
    const isOAuth = sessionStorage.getItem('pending_auth') === 'oauth';
    sessionStorage.removeItem('pending_auth');
    if (isOAuth) {
      // Google OAuth token → finalize into a real session
      try {
        await account.createSession(cbUserId, cbSecret);
        redirectAfterAuth();
      } catch (e) {
        showError('Google sign-in failed — the link may have expired. Please try again.');
      }
    } else {
      // Magic link callback
      setLoading(emailBtn, true, 'Verifying…');
      try {
        await account.updateMagicURLSession(cbUserId, cbSecret);
        redirectAfterAuth();
      } catch (e) {
        showError('Magic link expired or already used. Please request a new one.');
      }
    }
  })();
}

// Show error if OAuth failure redirect
if (params.get('error') === 'oauth_failed') {
  showError('Google sign-in was cancelled or failed. Please try again.');
}

// ── Check existing Appwrite session ────
(async () => {
  try {
    const aw = await account.get();
    if (aw?.$id && !cbUserId) { redirectAfterAuth(); return; }
  } catch {}

  // Check wallet localStorage
  try {
    const w = JSON.parse(localStorage.getItem('fud_wallet') || 'null');
    if (w?.pubkey && !cbUserId) { redirectAfterAuth(); return; }
  } catch {}

  // Wait for wallet extensions to inject
  await new Promise(r => setTimeout(r, 120));
  walletInfo = getWalletProvider();

  if (walletInfo) {
    walletBtnLabel.textContent = `${walletInfo.icon} Connect ${walletInfo.name}`;
    walletDetected.textContent = `${walletInfo.name} detected`;

    const inWalletBrowser = /Phantom|Solflare|Backpack/i.test(navigator.userAgent);
    if (inWalletBrowser) {
      autoConnectMsg.style.display = '';
      try {
        await walletInfo.p.connect({ onlyIfTrusted: true });
        if (walletInfo.p.publicKey) {
          autoConnectMsg.textContent = 'Wallet connected — signing in…';
          await doWalletLogin(walletInfo.p, walletInfo.name);
          return;
        }
      } catch {}
      autoConnectMsg.style.display = 'none';
    }
  } else if (isMobile()) {
    showMobileDeeplinks();
    walletBtn.style.display = 'none';
  }
})();

// ── Google OAuth ───────────────────────
// Uses createOAuth2Token (not the deprecated createOAuth2Session).
// After Google auth, Appwrite redirects back HERE with ?userId=&secret=
// We then call createSession() to finalize the session.
googleBtn.addEventListener('click', () => {
  setLoading(googleBtn, true, 'Redirecting to Google…');
  sessionStorage.setItem('pending_auth', 'oauth');
  const successUrl = `${location.origin}/login.html?next=${encodeURIComponent(nextUrl)}`;
  const failureUrl = `${location.origin}/login.html?error=oauth_failed`;
  account.createOAuth2Token('google', successUrl, failureUrl);
});

// ── Email magic link ───────────────────
emailBtn.addEventListener('click', async () => {
  const email = emailInput.value.trim();
  if (!email || !email.includes('@')) { showError('Enter a valid email address.'); return; }
  setLoading(emailBtn, true, 'Sending…');
  hideMessages();
  try {
    const redirectTo = location.origin + '/login.html';
    await account.createMagicURLToken(ID.unique(), email, redirectTo);
    showSuccess(`Magic link sent to ${email} — check your inbox and spam folder.`);
  } catch (e) {
    showError(e.message || 'Failed to send magic link. Try again.');
  }
  setLoading(emailBtn, false, '📧 Send Magic Link');
});

// Allow submitting email with Enter key
emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') emailBtn.click(); });

// ── Wallet auth ────────────────────────
function getWalletProvider() {
  if (window.phantom?.solana?.isPhantom) return { p: window.phantom.solana, name: 'Phantom', icon: '👻' };
  if (window.solflare?.isSolflare)       return { p: window.solflare, name: 'Solflare', icon: '☀️' };
  if (window.backpack?.isBackpack)       return { p: window.backpack, name: 'Backpack', icon: '🎒' };
  if (window.okxwallet?.solana)          return { p: window.okxwallet.solana, name: 'OKX', icon: '⭕' };
  if (window.solana)                     return { p: window.solana, name: 'Wallet', icon: '🔑' };
  if (window.glowSolana)                 return { p: window.glowSolana, name: 'Glow', icon: '✨' };
  return null;
}

function isMobile() { return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent); }

function showMobileDeeplinks() {
  const encoded = encodeURIComponent(location.href);
  const ref     = encodeURIComponent('https://fudfun.xyz');
  mobileDeeplinks.style.display = 'flex';
  mobileDeeplinks.innerHTML = `
    <p style="font-size:13px;color:var(--dim);text-align:center;margin-bottom:4px">Open in your wallet app:</p>
    <a class="deeplink-btn" href="https://phantom.app/ul/browse/${encoded}?ref=${ref}">👻 Open in Phantom</a>
    <a class="deeplink-btn" href="https://solflare.com/ul/v1/browse/${encoded}?ref=${ref}">☀️ Open in Solflare</a>
  `;
}

async function doWalletLogin(provider, name) {
  setLoading(walletBtn, true, 'Connecting…');
  hideMessages();
  try {
    try { await provider.connect({ onlyIfTrusted: true }); }
    catch { await provider.connect(); }

    const pubkey = provider.publicKey?.toString();
    if (!pubkey) throw new Error('Could not read wallet public key.');

    setLoading(walletBtn, true, 'Sign the message in your wallet…');
    const message  = `FudFun.xyz login: ${pubkey}\nTime: ${Date.now()}`;
    const msgBytes = new TextEncoder().encode(message);
    const { signature } = await provider.signMessage(msgBytes, 'utf8');
    const sigBase64 = btoa(String.fromCharCode(...signature));

    setLoading(walletBtn, true, 'Verifying…');
    const resp = await fetch('/api/wallet-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pubkey, signature: sigBase64, message }),
    });

    const data = await resp.json();
    if (!resp.ok || !data.verified) throw new Error(data.error || 'Verification failed');

    localStorage.setItem('fud_wallet', JSON.stringify({ pubkey: data.pubkey, token: data.token, ts: Date.now() }));
    showSuccess('Wallet verified! Entering…');
    setTimeout(redirectAfterAuth, 600);
  } catch (err) {
    const msg = err?.message || 'Wallet sign-in failed.';
    if (msg.toLowerCase().includes('user rejected') || msg.toLowerCase().includes('cancelled') || msg.toLowerCase().includes('denied')) {
      showError('Signature cancelled — tap the button and approve in your wallet.');
    } else {
      showError(msg);
    }
    setLoading(walletBtn, false, walletInfo ? `${walletInfo.icon} Connect ${walletInfo.name}` : '🔑 Connect Wallet');
  }
}

walletBtn.addEventListener('click', () => {
  if (walletInfo) {
    doWalletLogin(walletInfo.p, walletInfo.name);
  } else if (isMobile()) {
    showMobileDeeplinks();
    showError('No wallet detected. Tap a link below to open in your wallet app.');
  } else {
    showError('No Solana wallet found. Install Phantom or Solflare and refresh.');
  }
});
</script>
</body>
</html>
