<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="apple-touch-icon" href="/favicon.svg"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter — FudFun.xyz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #04050a;
      --ink-2: #09090f;
      --ink-3: #0f1018;
      --line: rgba(255,255,255,.06);
      --line-2: rgba(255,255,255,.12);
      --text: #F0F1FA;
      --dim: #7A7D96;
      --dim-2: #4a4d62;
      --red: #FF3D00;
      --orange: #FF8C00;
      --gold: #FFD700;
      --good: #00FF87;
      --bad: #FF5C5C;
      --r: 16px;
      --r-sm: 11px;
    }

    html, body { height: 100%; }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255,61,0,.14) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,140,0,.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 60% 30%, rgba(255,61,0,.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 2px);
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: var(--ink-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r);
      padding: 36px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,.9);
      margin: 24px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--dim); text-decoration: none;
      margin-bottom: 20px; transition: color .15s;
    }
    .back-link:hover { color: var(--text); }

    .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 26px;
    }

    .brand-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      display: grid; place-items: center; font-size: 24px; flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(255,61,0,.4);
    }

    .brand-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800; font-size: 22px; letter-spacing: -0.4px;
      text-shadow: 0 0 20px rgba(255,61,0,.5);
      color: var(--text);
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 24px; letter-spacing: -0.3px;
      color: var(--text); margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 13px; color: var(--dim); margin-bottom: 24px;
      font-weight: 400; line-height: 1.5;
    }

    .divider { height: 1px; background: var(--line); margin-bottom: 24px; }

    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; font-size: 11px; color: var(--dim-2);
      font-family: 'Space Mono', monospace; letter-spacing: 0.08em;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }

    .field { margin-bottom: 15px; }

    .field label {
      display: block; font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dim); margin-bottom: 7px;
    }

    .field input {
      width: 100%; background: var(--ink-3);
      border: 1px solid var(--line-2); border-radius: var(--r-sm);
      padding: 11px 14px; font-family: 'Inter', sans-serif;
      font-size: 14px; color: var(--text); outline: none;
      transition: border-color .18s, box-shadow .18s;
      -webkit-appearance: none;
    }

    .field input::placeholder { color: var(--dim-2); }

    .field input:focus {
      border-color: rgba(255,61,0,.55);
      box-shadow: 0 0 0 3px rgba(255,61,0,.12);
    }

    .error-msg {
      display: none;
      background: rgba(255,92,92,.10); border: 1px solid rgba(255,92,92,.30);
      border-radius: var(--r-sm); padding: 11px 14px;
      font-size: 13px; color: var(--bad); margin-bottom: 14px; line-height: 1.45;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      display: none;
      background: rgba(0,255,135,.08); border: 1px solid rgba(0,255,135,.25);
      border-radius: var(--r-sm); padding: 11px 14px;
      font-size: 13px; color: var(--good); margin-bottom: 14px; line-height: 1.45;
    }
    .success-msg.visible { display: block; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px 20px; border: none; border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--red) 0%, var(--orange) 100%);
      color: #fff; font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 16px; letter-spacing: .01em;
      cursor: pointer; transition: opacity .18s, transform .15s, box-shadow .18s;
      box-shadow: 0 4px 20px rgba(255,61,0,.35); margin-top: 4px;
    }

    .btn:hover:not(:disabled) {
      opacity: .9; transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(255,61,0,.5);
    }

    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-wallet {
      background: var(--ink-3);
      border: 1px solid var(--line-2);
      box-shadow: none;
      color: var(--text);
    }
    .btn-wallet:hover:not(:disabled) {
      border-color: rgba(255,61,0,.4);
      box-shadow: 0 0 0 3px rgba(255,61,0,.08);
    }

    .btn-spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .65s linear infinite; flex-shrink: 0;
    }

    .btn.loading .btn-spinner { display: block; }
    .btn.loading .btn-label { opacity: .7; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card-footer {
      margin-top: 18px; text-align: center;
      font-size: 12px; color: var(--dim-2); line-height: 1.6;
    }

    .redirect-overlay {
      display: none; position: fixed; inset: 0;
      background: var(--ink); z-index: 100; place-items: center;
    }
    .redirect-overlay.visible { display: grid; }

    .redirect-inner { text-align: center; }
    .redirect-inner p { color: var(--dim); font-size: 14px; margin-top: 12px; }

    .redirect-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--line-2); border-top-color: var(--red);
      border-radius: 50%; animation: spin .65s linear infinite; margin: 0 auto;
    }

    .mobile-deeplinks {
      display: flex; flex-direction: column; gap: 10px; margin-top: 12px;
    }
    .deeplink-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 16px; border: 1px solid var(--line-2);
      border-radius: var(--r-sm); background: var(--ink-3);
      color: var(--text); font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: border-color .15s;
    }
    .deeplink-btn:hover { border-color: rgba(255,61,0,.4); }

    .wallet-detected {
      font-size: 12px; color: var(--dim); text-align: center;
      margin-top: 10px; font-family: 'Space Mono', monospace;
    }

    .auto-connect-msg {
      text-align: center; color: var(--dim); font-size: 13px; margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div class="redirect-overlay" id="redirectOverlay">
    <div class="redirect-inner">
      <div class="redirect-spinner"></div>
      <p>Entering the FUD zone…</p>
    </div>
  </div>

  <div class="card" id="authCard">
    <a href="/" class="back-link" id="backLink">← Back to feed</a>

    <div class="brand">
      <div class="brand-icon">💀</div>
      <span class="brand-wordmark">FudFun.xyz</span>
    </div>

    <div class="divider"></div>

    <h1 class="card-title">Enter 💀</h1>
    <p class="card-subtitle">Post FUD and earn SOL tips.</p>

    <div class="error-msg" id="errorMsg" role="alert"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- Wallet sign-in -->
    <div id="autoConnectMsg" class="auto-connect-msg" style="display:none">Checking wallet…</div>
    <button type="button" class="btn btn-wallet" id="walletBtn">
      <div class="btn-spinner"></div>
      <span class="btn-label" id="walletBtnLabel">🔑 Connect Wallet</span>
    </button>
    <div class="wallet-detected" id="walletDetected"></div>

    <div id="mobileDeeplinks" style="display:none" class="mobile-deeplinks"></div>

    <div class="card-footer">
      Solana wallet required · <a href="https://phantom.app" target="_blank" rel="noopener" style="color:var(--dim);text-decoration:none">Get Phantom</a>
    </div>
  </div>

  <script>
    const redirectOverlay = document.getElementById('redirectOverlay');
    const errorMsg        = document.getElementById('errorMsg');
    const successMsg      = document.getElementById('successMsg');
    const walletBtn       = document.getElementById('walletBtn');
    const walletBtnLabel  = document.getElementById('walletBtnLabel');
    const walletDetected  = document.getElementById('walletDetected');
    const backLink        = document.getElementById('backLink');
    const mobileDeeplinks = document.getElementById('mobileDeeplinks');
    const autoConnectMsg  = document.getElementById('autoConnectMsg');

    const nextUrl = new URLSearchParams(location.search).get('next') || '/';
    backLink.href = '/';

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      successMsg.classList.remove('visible');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('visible');
      errorMsg.classList.remove('visible');
    }

    function hideMessages() {
      errorMsg.classList.remove('visible');
      successMsg.classList.remove('visible');
    }

    function setLoading(state, label) {
      walletBtn.disabled = state;
      walletBtn.classList.toggle('loading', state);
      if (label) walletBtnLabel.textContent = label;
    }

    function redirectAfterAuth() {
      redirectOverlay.classList.add('visible');
      window.location.href = nextUrl;
    }

    function getWalletProvider() {
      if (window.phantom?.solana?.isPhantom) return { p: window.phantom.solana, name: 'Phantom', icon: '👻' };
      if (window.solflare?.isSolflare)       return { p: window.solflare, name: 'Solflare', icon: '☀️' };
      if (window.backpack?.isBackpack)       return { p: window.backpack, name: 'Backpack', icon: '🎒' };
      if (window.okxwallet?.solana)          return { p: window.okxwallet.solana, name: 'OKX', icon: '⭕' };
      if (window.solana)                     return { p: window.solana, name: 'Wallet', icon: '🔑' };
      if (window.glowSolana)                 return { p: window.glowSolana, name: 'Glow', icon: '✨' };
      return null;
    }

    function isMobile() {
      return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    }

    function showMobileDeeplinks() {
      const encoded = encodeURIComponent(location.href);
      const ref     = encodeURIComponent('https://fudfun.xyz');
      mobileDeeplinks.style.display = 'flex';
      mobileDeeplinks.innerHTML = `
        <p style="font-size:13px;color:var(--dim);text-align:center;margin-bottom:4px">Open in your wallet app:</p>
        <a class="deeplink-btn" href="https://phantom.app/ul/browse/${encoded}?ref=${ref}">👻 Open in Phantom</a>
        <a class="deeplink-btn" href="https://solflare.com/ul/v1/browse/${encoded}?ref=${ref}">☀️ Open in Solflare</a>
      `;
    }

    async function doWalletLogin(provider, name) {
      setLoading(true, 'Connecting…');
      hideMessages();

      try {
        try { await provider.connect({ onlyIfTrusted: true }); }
        catch { await provider.connect(); }

        const pubkey = provider.publicKey?.toString();
        if (!pubkey) throw new Error('Could not read wallet public key.');

        setLoading(true, 'Sign the message in your wallet…');
        const message  = `FudFun.xyz login: ${pubkey}\nTime: ${Date.now()}`;
        const msgBytes = new TextEncoder().encode(message);
        const { signature } = await provider.signMessage(msgBytes, 'utf8');
        const sigBase64 = btoa(String.fromCharCode(...signature));

        setLoading(true, 'Verifying…');
        const resp = await fetch('/api/wallet-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pubkey, signature: sigBase64, message }),
        });

        const data = await resp.json();
        if (!resp.ok || !data.verified) throw new Error(data.error || 'Verification failed');

        localStorage.setItem('fud_wallet', JSON.stringify({ pubkey: data.pubkey, token: data.token, ts: Date.now() }));
        showSuccess('Wallet verified! Entering…');
        setTimeout(redirectAfterAuth, 600);
      } catch (err) {
        const msg = err?.message || 'Wallet sign-in failed.';
        if (msg.toLowerCase().includes('user rejected') || msg.toLowerCase().includes('cancelled') || msg.toLowerCase().includes('denied')) {
          showError('Signature cancelled — tap the button and approve in your wallet.');
        } else {
          showError(msg);
        }
        setLoading(false, `${walletInfo ? walletInfo.icon + ' Connect ' + walletInfo.name : '🔑 Connect Wallet'}`);
      }
    }

    let walletInfo = null;

    walletBtn.addEventListener('click', () => {
      if (walletInfo) {
        doWalletLogin(walletInfo.p, walletInfo.name);
      } else if (isMobile()) {
        showMobileDeeplinks();
        showError('No wallet detected. Tap a link below.');
      } else {
        showError('No Solana wallet found. Install Phantom or Solflare and refresh.');
      }
    });

    // On page load: check existing auth, detect wallet, auto-connect if inside wallet browser
    (async () => {
      // Already logged in via localStorage?
      try {
        const w = JSON.parse(localStorage.getItem('fud_wallet') || 'null');
        if (w?.pubkey) { redirectAfterAuth(); return; }
      } catch {}

      // Wait a tick for wallet extensions to inject
      await new Promise(r => setTimeout(r, 120));

      walletInfo = getWalletProvider();

      if (walletInfo) {
        walletBtnLabel.textContent = `${walletInfo.icon} Connect ${walletInfo.name}`;
        walletDetected.textContent = `${walletInfo.name} detected`;

        // If inside a wallet's in-app browser, auto-connect silently
        const inWalletBrowser =
          /Phantom/i.test(navigator.userAgent) ||
          /Solflare/i.test(navigator.userAgent) ||
          /Backpack/i.test(navigator.userAgent);

        if (inWalletBrowser) {
          autoConnectMsg.style.display = '';
          try {
            await walletInfo.p.connect({ onlyIfTrusted: true });
            if (walletInfo.p.publicKey) {
              autoConnectMsg.textContent = 'Wallet connected — signing in…';
              await doWalletLogin(walletInfo.p, walletInfo.name);
              return;
            }
          } catch { /* not pre-trusted, show button */ }
          autoConnectMsg.style.display = 'none';
        }
      } else if (isMobile()) {
        // No wallet on mobile — show deeplinks immediately
        showMobileDeeplinks();
        walletBtn.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
