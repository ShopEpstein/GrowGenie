<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter — FudFun.xyz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #04050a;
      --ink-2: #09090f;
      --ink-3: #0f1018;
      --line: rgba(255,255,255,.06);
      --line-2: rgba(255,255,255,.12);
      --text: #F0F1FA;
      --dim: #7A7D96;
      --dim-2: #4a4d62;
      --red: #FF3D00;
      --orange: #FF8C00;
      --gold: #FFD700;
      --good: #00FF87;
      --bad: #FF5C5C;
      --r: 16px;
      --r-sm: 11px;
    }

    html, body { height: 100%; }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255,61,0,.14) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,140,0,.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 60% 30%, rgba(255,61,0,.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 2px);
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: var(--ink-2);
      border: 1px solid var(--line-2);
      border-radius: var(--r);
      padding: 36px;
      box-shadow: 0 24px 60px -20px rgba(0,0,0,.9);
      margin: 24px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--dim); text-decoration: none;
      margin-bottom: 20px; transition: color .15s;
    }
    .back-link:hover { color: var(--text); }

    .brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 26px;
    }

    .brand-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      display: grid; place-items: center; font-size: 24px; flex-shrink: 0;
      box-shadow: 0 4px 20px rgba(255,61,0,.4);
    }

    .brand-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800; font-size: 22px; letter-spacing: -0.4px;
      text-shadow: 0 0 20px rgba(255,61,0,.5);
      color: var(--text);
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 24px; letter-spacing: -0.3px;
      color: var(--text); margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 13px; color: var(--dim); margin-bottom: 24px;
      font-weight: 400; line-height: 1.5;
    }

    .divider { height: 1px; background: var(--line); margin-bottom: 24px; }

    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; font-size: 11px; color: var(--dim-2);
      font-family: 'Space Mono', monospace; letter-spacing: 0.08em;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }

    .field { margin-bottom: 15px; }

    .field label {
      display: block; font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dim); margin-bottom: 7px;
    }

    .field input {
      width: 100%; background: var(--ink-3);
      border: 1px solid var(--line-2); border-radius: var(--r-sm);
      padding: 11px 14px; font-family: 'Inter', sans-serif;
      font-size: 14px; color: var(--text); outline: none;
      transition: border-color .18s, box-shadow .18s;
      -webkit-appearance: none;
    }

    .field input::placeholder { color: var(--dim-2); }

    .field input:focus {
      border-color: rgba(255,61,0,.55);
      box-shadow: 0 0 0 3px rgba(255,61,0,.12);
    }

    .error-msg {
      display: none;
      background: rgba(255,92,92,.10); border: 1px solid rgba(255,92,92,.30);
      border-radius: var(--r-sm); padding: 11px 14px;
      font-size: 13px; color: var(--bad); margin-bottom: 14px; line-height: 1.45;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      display: none;
      background: rgba(0,255,135,.08); border: 1px solid rgba(0,255,135,.25);
      border-radius: var(--r-sm); padding: 11px 14px;
      font-size: 13px; color: var(--good); margin-bottom: 14px; line-height: 1.45;
    }
    .success-msg.visible { display: block; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px 20px; border: none; border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--red) 0%, var(--orange) 100%);
      color: #fff; font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 16px; letter-spacing: .01em;
      cursor: pointer; transition: opacity .18s, transform .15s, box-shadow .18s;
      box-shadow: 0 4px 20px rgba(255,61,0,.35); margin-top: 4px;
    }

    .btn:hover:not(:disabled) {
      opacity: .9; transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(255,61,0,.5);
    }

    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-wallet {
      background: var(--ink-3);
      border: 1px solid var(--line-2);
      box-shadow: none;
      color: var(--text);
    }
    .btn-wallet:hover:not(:disabled) {
      border-color: rgba(255,61,0,.4);
      box-shadow: 0 0 0 3px rgba(255,61,0,.08);
    }

    .btn-spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .65s linear infinite; flex-shrink: 0;
    }

    .btn.loading .btn-spinner { display: block; }
    .btn.loading .btn-label { opacity: .7; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .card-footer {
      margin-top: 18px; text-align: center;
      font-size: 12px; color: var(--dim-2); line-height: 1.6;
    }

    .redirect-overlay {
      display: none; position: fixed; inset: 0;
      background: var(--ink); z-index: 100; place-items: center;
    }
    .redirect-overlay.visible { display: grid; }

    .redirect-inner { text-align: center; }
    .redirect-inner p { color: var(--dim); font-size: 14px; margin-top: 12px; }

    .redirect-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--line-2); border-top-color: var(--red);
      border-radius: 50%; animation: spin .65s linear infinite; margin: 0 auto;
    }

    .mobile-deeplinks {
      display: flex; flex-direction: column; gap: 10px; margin-top: 12px;
    }
    .deeplink-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 16px; border: 1px solid var(--line-2);
      border-radius: var(--r-sm); background: var(--ink-3);
      color: var(--text); font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600; text-decoration: none;
      transition: border-color .15s;
    }
    .deeplink-btn:hover { border-color: rgba(255,61,0,.4); }

    .btn-google {
      background: #fff; color: #1a1a1a; border: none;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { background: #f0f0f0; }
  </style>
</head>
<body>

  <div class="redirect-overlay" id="redirectOverlay">
    <div class="redirect-inner">
      <div class="redirect-spinner"></div>
      <p>Entering the FUD zone…</p>
    </div>
  </div>

  <div class="card" id="authCard">
    <a href="/" class="back-link" id="backLink">← Back to feed</a>

    <div class="brand">
      <div class="brand-icon">💀</div>
      <span class="brand-wordmark">FudFun.xyz</span>
    </div>

    <div class="divider"></div>

    <h1 class="card-title">Enter 💀</h1>
    <p class="card-subtitle">Post FUD and earn SOL tips.</p>

    <div class="error-msg" id="errorMsg" role="alert"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- Wallet sign-in (primary) -->
    <button type="button" class="btn btn-wallet" id="walletBtn">
      <div class="btn-spinner"></div>
      <span class="btn-label">🔑 Connect Wallet</span>
    </button>

    <div id="mobileDeeplinks" style="display:none" class="mobile-deeplinks"></div>

    <div class="or-divider">OR</div>

    <!-- Google sign-in -->
    <button type="button" class="btn btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="flex-shrink:0">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span class="btn-label">Continue with Google</span>
    </button>

    <div class="card-footer">
      <a href="#" id="showEmailLink" style="color:var(--dim-2);font-size:11px;text-decoration:none">sign in with email →</a>
    </div>

    <!-- Email form (hidden, shown on demand) -->
    <form id="loginForm" novalidate style="display:none;margin-top:12px">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="submitBtn">
        <div class="btn-spinner"></div>
        <span class="btn-label">Enter with Email 💀</span>
      </button>
    </form>
  </div>

  <script type="module">
    import { Client, Account, ID } from 'https://cdn.jsdelivr.net/npm/appwrite@17/dist/esm/sdk.js';

    const client = new Client()
      .setEndpoint('https://nyc.cloud.appwrite.io/v1')
      .setProject('6a2bc15c00065b3c91a0');

    const account = new Account(client);

    const redirectOverlay = document.getElementById('redirectOverlay');
    const errorMsg        = document.getElementById('errorMsg');
    const successMsg      = document.getElementById('successMsg');
    const loginForm       = document.getElementById('loginForm');
    const submitBtn       = document.getElementById('submitBtn');
    const walletBtn       = document.getElementById('walletBtn');
    const backLink        = document.getElementById('backLink');
    const mobileDeeplinks = document.getElementById('mobileDeeplinks');

    // Wire up back link to ?next= if present, otherwise /
    const nextUrl = new URLSearchParams(location.search).get('next') || '/';
    backLink.href = nextUrl === '/' ? '/' : '/';

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      successMsg.classList.remove('visible');
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.classList.add('visible');
      errorMsg.classList.remove('visible');
    }

    function hideMessages() {
      errorMsg.classList.remove('visible');
      successMsg.classList.remove('visible');
    }

    function setLoading(btn, state, label) {
      btn.disabled = state;
      btn.classList.toggle('loading', state);
      if (!state && label) btn.querySelector('.btn-label').textContent = label;
    }

    function redirectAfterAuth() {
      redirectOverlay.classList.add('visible');
      window.location.href = nextUrl;
    }

    // Detect any installed Solana wallet provider
    function getWalletProvider() {
      if (window.phantom?.solana?.isPhantom)  return window.phantom.solana;
      if (window.solflare?.isSolflare)         return window.solflare;
      if (window.backpack?.isBackpack)         return window.backpack;
      if (window.solana)                       return window.solana;
      if (window.xnft?.solana)                 return window.xnft.solana;
      if (window.glowSolana)                   return window.glowSolana;
      if (window.okxwallet?.solana)            return window.okxwallet.solana;
      return null;
    }

    function isMobile() {
      return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    }

    function showMobileDeeplinks() {
      const encoded = encodeURIComponent(location.href);
      const ref     = encodeURIComponent('https://fudfun.xyz');

      mobileDeeplinks.style.display = 'flex';
      mobileDeeplinks.innerHTML = `
        <p style="font-size:13px;color:var(--dim);text-align:center;margin-bottom:4px;">Open in your wallet app to sign in:</p>
        <a class="deeplink-btn" href="https://phantom.app/ul/browse/${encoded}?ref=${ref}">
          👻 Open in Phantom
        </a>
        <a class="deeplink-btn" href="https://solflare.com/ul/v1/browse/${encoded}?ref=${ref}">
          ☀️ Open in Solflare
        </a>
      `;
    }

    async function connectWalletLogin() {
      const provider = getWalletProvider();

      if (!provider) {
        if (isMobile()) {
          showMobileDeeplinks();
          showError('No wallet detected. Tap a link below to open in your wallet app.');
        } else {
          showError('No Solana wallet found. Install Phantom or Solflare and refresh.');
        }
        return;
      }

      setLoading(walletBtn, true, 'Connecting…');
      hideMessages();

      try {
        // Connect (silently if already trusted, else show popup)
        try {
          await provider.connect({ onlyIfTrusted: true });
        } catch {
          await provider.connect();
        }

        const pubkey = provider.publicKey?.toString();
        if (!pubkey) throw new Error('Could not read wallet public key.');

        setLoading(walletBtn, true, 'Sign the message in your wallet…');

        // Sign ownership proof
        const message = `FudFun.xyz login: ${pubkey}\nTime: ${Date.now()}`;
        const msgBytes = new TextEncoder().encode(message);
        const { signature } = await provider.signMessage(msgBytes, 'utf8');

        // Convert signature (Uint8Array) to base64
        const sigBase64 = btoa(String.fromCharCode(...signature));

        setLoading(walletBtn, true, 'Verifying…');

        // Server-side verification + Appwrite user creation
        const resp = await fetch('/api/wallet-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pubkey, signature: sigBase64, message }),
        });

        const data = await resp.json();
        if (!resp.ok || !data.verified) throw new Error(data.error || 'Verification failed');

        // Store wallet identity in localStorage — no Appwrite session needed
        localStorage.setItem('fud_wallet', JSON.stringify({ pubkey: data.pubkey, ts: Date.now() }));

        showSuccess('Wallet verified! Entering…');
        setTimeout(redirectAfterAuth, 600);
      } catch (err) {
        const msg = err?.message || 'Wallet sign-in failed.';
        if (msg.toLowerCase().includes('user rejected') || msg.toLowerCase().includes('cancelled')) {
          showError('Signature cancelled. Try again to sign in.');
        } else {
          showError(msg);
        }
        setLoading(walletBtn, false, '🔑 Connect Wallet');
      }
    }

    walletBtn.addEventListener('click', connectWalletLogin);

    // Google OAuth
    document.getElementById('googleBtn').addEventListener('click', () => {
      account.createOAuth2Session('google',
        `${location.origin}/`,
        `${location.origin}/login.html`
      );
    });

    // Show email form on demand
    document.getElementById('showEmailLink').addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('loginForm').style.display = '';
      e.target.style.display = 'none';
    });

    // Already authed? (Appwrite session from Google OR wallet localStorage)
    (async () => {
      // Check localStorage wallet first — fastest
      try {
        const w = JSON.parse(localStorage.getItem('fud_wallet') || 'null');
        if (w?.pubkey) { redirectAfterAuth(); return; }
      } catch {}
      // Check Appwrite session (from Google OAuth)
      try {
        await account.get();
        redirectAfterAuth();
      } catch { /* show form */ }
    })();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      setLoading(submitBtn, true, 'Entering…');

      try {
        await account.createEmailPasswordSession(email, password);
        redirectAfterAuth();
      } catch (signInErr) {
        const errCode = signInErr?.code;
        const errMsg  = (signInErr?.message || '').toLowerCase();
        const isUnknownUser = errCode === 401 || errMsg.includes('invalid credentials') ||
                              errMsg.includes('user not found') || errMsg.includes('invalid email');

        if (isUnknownUser) {
          setLoading(submitBtn, true, 'Creating account…');
          try {
            showSuccess('New account — creating yours now…');
            await account.create(ID.unique(), email, email, password);
            await account.createEmailPasswordSession(email, password);
            redirectAfterAuth();
          } catch (createErr) {
            const msg = createErr?.message || 'Could not create account. Try a different email.';
            showError(msg);
            setLoading(submitBtn, false, 'Enter with Email 💀');
          }
        } else {
          const msg = signInErr?.message || 'Sign in failed. Check your password.';
          showError(msg);
          setLoading(submitBtn, false, 'Enter with Email 💀');
        }
      }
    });
  </script>
</body>
</html>
