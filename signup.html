<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — FudFun.xyz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0B0C13;
      --ink-2: #101220;
      --ink-3: #171a2b;
      --line: rgba(255,255,255,.08);
      --line-2: rgba(255,255,255,.14);
      --text: #ECEDF5;
      --dim: #8A8DA3;
      --dim-2: #5d6075;
      --accent: #8A5BFF;
      --accent-2: #FF4D9D;
      --good: #2BD576;
      --bad: #FF5C5C;
      --r: 16px;
      --r-sm: 11px;
      --shadow: 0 18px 50px -20px rgba(0,0,0,.7);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(138,91,255,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,77,157,.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 60% 30%, rgba(138,91,255,.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--ink-2);
      border: 1px solid var(--line);
      border-radius: var(--r);
      padding: 36px;
      box-shadow: var(--shadow);
      margin: 24px;
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(138,91,255,.4);
    }

    .brand-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.4px;
      background: linear-gradient(90deg, var(--text) 0%, var(--dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Headings */
    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--dim);
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--line);
      margin-bottom: 28px;
    }

    /* Fields */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: var(--ink-3);
      border: 1px solid var(--line-2);
      border-radius: var(--r-sm);
      padding: 11px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
      -webkit-appearance: none;
    }

    .field input::placeholder {
      color: var(--dim-2);
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(138,91,255,.18);
    }

    .field input:focus-visible {
      border-color: var(--accent);
    }

    /* Password match indicator */
    .field input.input-error {
      border-color: var(--bad);
      box-shadow: 0 0 0 3px rgba(255,92,92,.15);
    }

    .field input.input-ok {
      border-color: var(--good);
      box-shadow: 0 0 0 3px rgba(43,213,118,.12);
    }

    .field-hint {
      font-size: 12px;
      margin-top: 5px;
      min-height: 16px;
      transition: color .15s;
    }

    .field-hint.bad { color: var(--bad); }
    .field-hint.good { color: var(--good); }

    /* Error */
    .error-msg {
      display: none;
      background: rgba(255,92,92,.10);
      border: 1px solid rgba(255,92,92,.30);
      border-radius: var(--r-sm);
      padding: 11px 14px;
      font-size: 13px;
      color: var(--bad);
      margin-bottom: 16px;
      line-height: 1.45;
    }

    .error-msg.visible {
      display: block;
    }

    /* Button */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: opacity .18s, transform .15s, box-shadow .18s;
      box-shadow: 0 4px 20px rgba(138,91,255,.35);
      margin-top: 4px;
    }

    .btn:hover:not(:disabled) {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(138,91,255,.45);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
      opacity: 1;
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      flex-shrink: 0;
    }

    .btn.loading .btn-spinner { display: block; }
    .btn.loading .btn-label { opacity: .7; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer link */
    .card-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 13px;
      color: var(--dim);
    }

    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color .15s;
    }

    .card-footer a:hover {
      color: var(--accent-2);
      text-decoration: underline;
    }

    /* Redirect overlay */
    .redirect-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--ink);
      z-index: 100;
      place-items: center;
    }

    .redirect-overlay.visible {
      display: grid;
    }

    .redirect-inner {
      text-align: center;
    }

    .redirect-inner p {
      color: var(--dim);
      font-size: 14px;
      margin-top: 12px;
    }

    .redirect-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--line-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div class="redirect-overlay" id="redirectOverlay">
    <div class="redirect-inner">
      <div class="redirect-spinner"></div>
      <p>Redirecting…</p>
    </div>
  </div>

  <div class="card" id="authCard">
    <div class="brand">
      <div class="brand-icon">💀</div>
      <span class="brand-wordmark">FudFun.xyz</span>
    </div>

    <div class="divider"></div>

    <h1 class="card-title">Join FudFun 💀</h1>
    <p class="card-subtitle">Free account. Unlimited FUD. No regrets.</p>

    <div class="error-msg" id="errorMsg" role="alert"></div>

    <form id="signupForm" novalidate>
      <div class="field">
        <label for="name">Full name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Alex Johnson"
          autocomplete="name"
          required
        />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="new-password"
          required
        />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          autocomplete="new-password"
          required
        />
        <div class="field-hint" id="confirmHint"></div>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <div class="btn-spinner"></div>
        <span class="btn-label">Create account</span>
      </button>
    </form>

    <div class="card-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <script type="module">
    import { Client, Account, ID } from 'https://cdn.jsdelivr.net/npm/appwrite@17/dist/esm/sdk.js';

    const client = new Client()
      .setEndpoint('https://nyc.cloud.appwrite.io/v1')
      .setProject('6a2bc15c00065b3c91a0');

    const account = new Account(client);

    const redirectOverlay = document.getElementById('redirectOverlay');
    const errorMsg = document.getElementById('errorMsg');
    const signupForm = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const confirmInput = document.getElementById('confirmPassword');
    const passwordInput = document.getElementById('password');
    const confirmHint = document.getElementById('confirmHint');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      // Scroll to top of card so error is visible
      errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideError() {
      errorMsg.classList.remove('visible');
      errorMsg.textContent = '';
    }

    function setLoading(state) {
      submitBtn.disabled = state;
      submitBtn.classList.toggle('loading', state);
    }

    function redirectToDashboard() {
      redirectOverlay.classList.add('visible');
      window.location.href = 'fud.html';
    }

    // Live password-match feedback
    function checkPasswordMatch() {
      const pw = passwordInput.value;
      const cpw = confirmInput.value;

      if (!cpw) {
        confirmInput.classList.remove('input-error', 'input-ok');
        confirmHint.textContent = '';
        confirmHint.className = 'field-hint';
        return;
      }

      if (pw === cpw) {
        confirmInput.classList.remove('input-error');
        confirmInput.classList.add('input-ok');
        confirmHint.textContent = 'Passwords match';
        confirmHint.className = 'field-hint good';
      } else {
        confirmInput.classList.remove('input-ok');
        confirmInput.classList.add('input-error');
        confirmHint.textContent = 'Passwords do not match';
        confirmHint.className = 'field-hint bad';
      }
    }

    confirmInput.addEventListener('input', checkPasswordMatch);
    passwordInput.addEventListener('input', () => {
      if (confirmInput.value) checkPasswordMatch();
    });

    // On page load: check if already authenticated
    (async () => {
      try {
        await account.get();
        // Session exists — redirect immediately
        redirectToDashboard();
      } catch {
        // Not authenticated — show signup form normally
      }
    })();

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      // Client-side validation
      if (!name) {
        showError('Please enter your full name.');
        return;
      }

      if (!email) {
        showError('Please enter your email address.');
        return;
      }

      if (!password) {
        showError('Please choose a password.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters long.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match. Please try again.');
        confirmInput.classList.add('input-error');
        confirmInput.classList.remove('input-ok');
        return;
      }

      setLoading(true);

      try {
        // Create the user account
        await account.create(ID.unique(), email, password, name);
        // Immediately create a session
        await account.createEmailPasswordSession(email, password);
        redirectToDashboard();
      } catch (err) {
        const msg = err?.message || 'Account creation failed. Please try again.';
        showError(msg);
        setLoading(false);
      }
    });
  </script>
</body>
</html>
