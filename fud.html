<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The FUD Feed — FudFun.xyz 💀</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0B0C13;
  --ink-2: #101220;
  --ink-3: #171a2b;
  --line: rgba(255,255,255,.08);
  --line-2: rgba(255,255,255,.14);
  --text: #ECEDF5;
  --dim: #8A8DA3;
  --dim-2: #5d6075;
  --accent: #FF3D00;
  --accent-2: #FF9100;
  --gold: #FFC53D;
  --good: #2BD576;
  --bad: #FF5C5C;
  --r: 16px;
  --r-sm: 11px;
}

html, body { height: 100%; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  line-height: 1.5;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(60% 50% at 80% -10%, rgba(255,61,0,.22), transparent 70%),
    radial-gradient(55% 45% at 10% 5%, rgba(255,145,0,.15), transparent 70%);
  opacity: .7;
}

a { color: inherit; text-decoration: none; }
.mono { font-family: 'Space Mono', monospace; }
.grotesk { font-family: 'Space Grotesk', sans-serif; }
.wrap { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 0 20px; }

/* ---------- topbar ---------- */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11,12,19,.88);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--line);
}
.topbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  height: 60px;
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 20px;
}
.brand {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.brand:hover { color: var(--accent-2); }
.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
#user-email {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--r-sm);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #e63600; transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--dim);
  border: 1px solid var(--line-2);
}
.btn-ghost:hover { color: var(--text); border-color: var(--line-2); background: var(--ink-3); }

/* ---------- page header ---------- */
.page-header {
  position: relative;
  z-index: 1;
  padding: 48px 0 32px;
}
.page-title-row {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.page-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(28px, 5vw, 40px);
  font-weight: 700;
  line-height: 1.1;
}
.count-badge {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  background: var(--accent);
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  display: inline-block;
}

/* ---------- filter pills ---------- */
.filters-wrap {
  position: relative;
  z-index: 1;
  margin-bottom: 32px;
}
.filters {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--line-2);
  background: var(--ink-2);
  color: var(--dim);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.pill:hover { color: var(--text); border-color: rgba(255,255,255,.3); }
.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ---------- grid ---------- */
.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  padding-bottom: 80px;
}
@media (max-width: 680px) {
  .grid { grid-template-columns: 1fr; }
  #user-email { display: none; }
}

/* ---------- skeleton ---------- */
.skeleton-card {
  background: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 24px;
  border-left: 3px solid var(--line-2);
}
.skel {
  background: linear-gradient(90deg, var(--ink-3) 25%, rgba(255,255,255,.04) 50%, var(--ink-3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skel-title { height: 22px; width: 65%; margin-bottom: 12px; }
.skel-badge { height: 18px; width: 80px; border-radius: 20px; margin-bottom: 14px; }
.skel-text { height: 14px; width: 90%; margin-bottom: 8px; }
.skel-text-short { height: 14px; width: 60%; margin-bottom: 16px; }
.skel-btns { display: flex; gap: 8px; margin-top: 16px; }
.skel-btn { height: 34px; flex: 1; border-radius: var(--r-sm); }

/* ---------- fud card ---------- */
.fud-card {
  background: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border-left: 3px solid var(--line-2);
  transition: transform .18s, box-shadow .18s;
  position: relative;
}
.fud-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 16px 40px -12px rgba(0,0,0,.6);
}
.fud-card[data-cat="ex"]      { border-left-color: #FF5C5C; }
.fud-card[data-cat="boss"]    { border-left-color: #FF9100; }
.fud-card[data-cat="family"]  { border-left-color: #FFC53D; }
.fud-card[data-cat="hate"]    { border-left-color: #FF3D00; }
.fud-card[data-cat="profit"]  { border-left-color: #2BD576; }
.fud-card[data-cat="boredom"] { border-left-color: #8A8DA3; }
.fud-card[data-cat="fun"]     { border-left-color: #A78BFA; }
.fud-card[data-cat="coin"]    { border-left-color: #FFC53D; }
.fud-card[data-cat="smear"]   { border-left-color: #FF9100; }
.fud-card[data-cat="other"]   { border-left-color: var(--line-2); }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 700;
  line-height: 1.25;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cat-badge {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--ink-3);
  border: 1px solid var(--line-2);
  white-space: nowrap;
}
.cat-badge[data-cat="ex"]      { color: #FF5C5C; border-color: rgba(255,92,92,.3); background: rgba(255,92,92,.1); }
.cat-badge[data-cat="boss"]    { color: #FF9100; border-color: rgba(255,145,0,.3); background: rgba(255,145,0,.1); }
.cat-badge[data-cat="family"]  { color: #FFC53D; border-color: rgba(255,197,61,.3); background: rgba(255,197,61,.1); }
.cat-badge[data-cat="hate"]    { color: #FF3D00; border-color: rgba(255,61,0,.3); background: rgba(255,61,0,.1); }
.cat-badge[data-cat="profit"]  { color: #2BD576; border-color: rgba(43,213,118,.3); background: rgba(43,213,118,.1); }
.cat-badge[data-cat="boredom"] { color: #8A8DA3; border-color: rgba(138,141,163,.3); background: rgba(138,141,163,.1); }
.cat-badge[data-cat="fun"]     { color: #A78BFA; border-color: rgba(167,139,250,.3); background: rgba(167,139,250,.1); }
.cat-badge[data-cat="coin"]    { color: #FFC53D; border-color: rgba(255,197,61,.3); background: rgba(255,197,61,.1); }
.cat-badge[data-cat="smear"]   { color: #FF9100; border-color: rgba(255,145,0,.3); background: rgba(255,145,0,.1); }
.cat-badge[data-cat="other"]   { color: var(--dim); }

.card-excerpt {
  font-size: 13.5px;
  color: var(--dim);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-stats {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 12px;
  color: var(--dim-2);
  font-family: 'Space Mono', monospace;
}
.stat-item { display: flex; align-items: center; gap: 5px; }

.card-actions {
  display: flex;
  gap: 8px;
  margin-top: auto;
}
.btn-join {
  flex: 1;
  padding: 9px 14px;
  border-radius: var(--r-sm);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  background: var(--ink-3);
  border: 1px solid var(--line-2);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  display: block;
}
.btn-join:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-tip {
  padding: 9px 14px;
  border-radius: var(--r-sm);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  background: rgba(255,197,61,.12);
  border: 1px solid rgba(255,197,61,.25);
  color: var(--gold);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn-tip:hover { background: rgba(255,197,61,.22); border-color: rgba(255,197,61,.5); }

/* ---------- empty state ---------- */
.empty-state {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 80px 20px;
  text-align: center;
}
.empty-state h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--dim);
}
.empty-state a {
  color: var(--accent-2);
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* ---------- modal ---------- */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--ink-2);
  border: 1px solid var(--line-2);
  border-radius: var(--r);
  padding: 32px;
  width: 100%;
  max-width: 420px;
  position: relative;
  transform: translateY(12px);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-close {
  position: absolute;
  top: 14px;
  right: 16px;
  background: none;
  border: none;
  color: var(--dim);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  padding: 4px;
  transition: color .15s;
}
.modal-close:hover { color: var(--text); }
.modal-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}
.modal-sub {
  font-size: 13.5px;
  color: var(--dim);
  margin-bottom: 24px;
  line-height: 1.5;
}
.wallet-display {
  background: var(--ink-3);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--gold);
  word-break: break-all;
  margin-bottom: 16px;
}
.amount-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}
.amount-row label {
  font-size: 13px;
  color: var(--dim);
  white-space: nowrap;
}
.amount-input {
  flex: 1;
  background: var(--ink-3);
  border: 1px solid var(--line-2);
  border-radius: var(--r-sm);
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
.amount-input:focus { border-color: var(--gold); }
.sol-label {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--dim);
}
.btn-tip-send {
  width: 100%;
  padding: 12px;
  border-radius: var(--r-sm);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 700;
  background: var(--gold);
  color: var(--ink);
  border: none;
  cursor: pointer;
  transition: all .15s;
}
.btn-tip-send:hover:not(:disabled) { background: #ffcf60; transform: translateY(-1px); }
.btn-tip-send:disabled { opacity: .5; cursor: not-allowed; }
.no-wallet-msg {
  text-align: center;
  padding: 20px;
  color: var(--dim);
  font-size: 14px;
  line-height: 1.6;
}
.tip-success {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 12px 0 4px;
  text-align: center;
}
.tip-success-icon { font-size: 40px; }
.tip-success-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--good);
}
.tip-success-sub { font-size: 13px; color: var(--dim); }

/* ---------- toast ---------- */
.toast-wrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--ink-3);
  border: 1px solid var(--line-2);
  border-radius: var(--r-sm);
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  pointer-events: all;
  animation: toast-in .3s ease forwards;
  box-shadow: 0 8px 30px rgba(0,0,0,.5);
}
.toast.good { border-color: var(--good); color: var(--good); }
.toast.bad  { border-color: var(--bad);  color: var(--bad); }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---------- spinner ---------- */
.spinner-page {
  position: fixed;
  inset: 0;
  z-index: 400;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-label {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--dim);
}
</style>
</head>
<body>

<!-- auth spinner -->
<div class="spinner-page" id="auth-spinner">
  <div class="spinner"></div>
  <div class="spinner-label">checking auth...</div>
</div>

<!-- topbar -->
<header class="topbar" id="topbar" style="display:none">
  <div class="topbar-inner">
    <a href="/" class="brand">💀 FudFun.xyz</a>
    <div class="topbar-right">
      <span class="mono" id="user-email"></span>
      <a href="submit.html" class="btn btn-primary">Start a FUD 🔥</a>
      <button class="btn btn-ghost" id="sign-out-btn">Sign out</button>
    </div>
  </div>
</header>

<!-- main content -->
<main id="main-content" style="display:none">
  <div class="wrap">

    <!-- page header -->
    <div class="page-header">
      <div class="page-title-row">
        <h1 class="page-title grotesk">The FUD Feed</h1>
        <span class="count-badge" id="count-badge">0</span>
      </div>
    </div>

    <!-- filters -->
    <div class="filters-wrap">
      <div class="filters" id="filters">
        <button class="pill active" data-cat="all">All</button>
        <button class="pill" data-cat="ex">💔 Ex</button>
        <button class="pill" data-cat="boss">😤 Boss</button>
        <button class="pill" data-cat="family">👴 Family</button>
        <button class="pill" data-cat="hate">🔥 Hate</button>
        <button class="pill" data-cat="profit">💰 Profit</button>
        <button class="pill" data-cat="boredom">😴 Boredom</button>
        <button class="pill" data-cat="fun">😂 Fun</button>
        <button class="pill" data-cat="coin">🎯 Coin</button>
      </div>
    </div>

    <!-- cards grid -->
    <div class="grid" id="cards-grid"></div>
  </div>
</main>

<!-- tip modal -->
<div class="modal-overlay" id="tip-modal" role="dialog" aria-modal="true">
  <div class="modal" id="tip-modal-inner">
    <button class="modal-close" id="modal-close-btn" aria-label="Close">✕</button>
    <div id="tip-form-content">
      <div class="modal-title">💸 Tip the FUD creator</div>
      <div class="modal-sub">Send SOL directly to their wallet. Quality FUD deserves recognition.</div>
      <div id="tip-wallet-area"></div>
      <div id="tip-action-area"></div>
    </div>
    <div class="tip-success" id="tip-success-block">
      <div class="tip-success-icon">🔥</div>
      <div class="tip-success-title">FUD tipped!</div>
      <div class="tip-success-sub">The creator appreciates your support.</div>
    </div>
  </div>
</div>

<!-- toast container -->
<div class="toast-wrap" id="toast-wrap"></div>

<script type="module">
import { Client, Account, Databases, Query } from 'https://cdn.jsdelivr.net/npm/appwrite@17/dist/esm/sdk.js';

const ENDPOINT = 'https://nyc.cloud.appwrite.io/v1';
const PROJECT  = '6a2bc15c00065b3c91a0';
const DB       = 'growthgenie';
const COL      = 'campaigns';

const client = new Client().setEndpoint(ENDPOINT).setProject(PROJECT);
const account = new Account(client);
const databases = new Databases(client);

let allCampaigns = [];
let activeCat = 'all';
let tipCampaign = null;

const CAT_LABELS = {
  ex:      '💔 Ex',
  boss:    '😤 Boss',
  family:  '👴 Family',
  hate:    '🔥 Hate',
  profit:  '💰 Profit',
  boredom: '😴 Boredom',
  fun:     '😂 Fun',
  coin:    '🎯 Coin',
  smear:   '😤 Boss',
  other:   '🤷 Other',
};

function resolveCat(doc) {
  if (doc.campaignType === 'smear') return 'boss';
  if (doc.campaignType === 'fudfund') return doc.fudCategory || 'hate';
  return 'other';
}

function targetName(doc) {
  return doc.fudTarget || doc.smearTarget || doc.projectName || 'Unknown Target';
}

function excerpt(doc) {
  return doc.tag || doc.title || '';
}

function slugFor(doc) {
  return doc.slug || doc.$id;
}

function showToast(msg, type = '') {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function renderSkeletons() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = Array(4).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skel skel-title"></div>
      <div class="skel skel-badge"></div>
      <div class="skel skel-text"></div>
      <div class="skel skel-text-short"></div>
      <div class="skel-btns">
        <div class="skel skel-btn"></div>
        <div class="skel skel-btn" style="max-width:80px"></div>
      </div>
    </div>
  `).join('');
}

function renderCards(campaigns) {
  const grid = document.getElementById('cards-grid');
  document.getElementById('count-badge').textContent = campaigns.length;

  if (!campaigns.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <h2>No FUD campaigns yet.</h2>
        <p>Be the first! <a href="submit.html">Start one now →</a></p>
      </div>`;
    return;
  }

  grid.innerHTML = campaigns.map(doc => {
    const cat = resolveCat(doc);
    const name = targetName(doc);
    const blurb = excerpt(doc);
    const slug = slugFor(doc);
    const contributors = doc.numWinners || '--';
    const hasTip = !!doc.tipWallet;
    const label = CAT_LABELS[cat] || cat;

    return `
      <div class="fud-card" data-cat="${cat}" data-id="${doc.$id}">
        <div class="card-top">
          <div class="card-title grotesk">${esc(name)}</div>
          <span class="cat-badge" data-cat="${cat}">${label}</span>
        </div>
        ${blurb ? `<div class="card-excerpt">${esc(blurb)}</div>` : ''}
        <div class="card-stats">
          <span class="stat-item">👥 ${contributors}</span>
          ${hasTip ? '<span class="stat-item">💸 Tips on</span>' : ''}
        </div>
        <div class="card-actions">
          <a href="campaign.html?c=${encodeURIComponent(slug)}" class="btn-join">Join the FUD →</a>
          <button class="btn-tip" data-id="${doc.$id}">💸 Tip</button>
        </div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.btn-tip').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const doc = allCampaigns.find(c => c.$id === id);
      if (doc) openTipModal(doc);
    });
  });
}

function filterAndRender() {
  const filtered = activeCat === 'all'
    ? allCampaigns
    : allCampaigns.filter(d => resolveCat(d) === activeCat);
  renderCards(filtered);
}

function openTipModal(doc) {
  tipCampaign = doc;
  const overlay = document.getElementById('tip-modal');
  const walletArea = document.getElementById('tip-wallet-area');
  const actionArea = document.getElementById('tip-action-area');
  const successBlock = document.getElementById('tip-success-block');
  const formContent = document.getElementById('tip-form-content');

  successBlock.style.display = 'none';
  formContent.style.display = 'block';

  if (!doc.tipWallet) {
    walletArea.innerHTML = '';
    actionArea.innerHTML = `<div class="no-wallet-msg">Creator hasn't set a tip wallet yet.</div>`;
  } else {
    const short = doc.tipWallet.length > 20
      ? doc.tipWallet.slice(0,8) + '...' + doc.tipWallet.slice(-8)
      : doc.tipWallet;
    walletArea.innerHTML = `<div class="wallet-display">${esc(doc.tipWallet)}</div>`;
    actionArea.innerHTML = `
      <div class="amount-row">
        <label>Amount</label>
        <input class="amount-input" id="tip-amount" type="number" min="0.01" step="0.01" value="0.1" />
        <span class="sol-label">SOL</span>
      </div>
      <button class="btn-tip-send" id="tip-send-btn">Connect Wallet &amp; Tip</button>`;

    document.getElementById('tip-send-btn').addEventListener('click', doTip);
  }

  overlay.classList.add('open');
}

function closeTipModal() {
  document.getElementById('tip-modal').classList.remove('open');
  tipCampaign = null;
}

async function doTip() {
  if (!tipCampaign || !tipCampaign.tipWallet) return;

  const amtInput = document.getElementById('tip-amount');
  const amount = parseFloat(amtInput?.value || '0.1');
  if (isNaN(amount) || amount < 0.01) {
    showToast('Enter a valid amount (min 0.01 SOL)', 'bad');
    return;
  }

  const btn = document.getElementById('tip-send-btn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';

  try {
    if (!window.solana || !window.solana.isPhantom) {
      throw new Error('Phantom wallet not found. Install it at phantom.app');
    }

    await window.solana.connect();
    btn.textContent = 'Sending...';

    const solanaWeb3 = await loadSolanaWeb3();
    const { Connection, PublicKey, Transaction, SystemProgram, LAMPORTS_PER_SOL } = solanaWeb3;

    const connection = new Connection('https://api.mainnet-beta.solana.com', 'confirmed');
    const from = new PublicKey(window.solana.publicKey.toString());
    const to = new PublicKey(tipCampaign.tipWallet);
    const lamports = Math.round(amount * LAMPORTS_PER_SOL);

    const tx = new Transaction().add(
      SystemProgram.transfer({ fromPubkey: from, toPubkey: to, lamports })
    );

    const { blockhash } = await connection.getLatestBlockhash();
    tx.recentBlockhash = blockhash;
    tx.feePayer = from;

    const signed = await window.solana.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());
    await connection.confirmTransaction(sig, 'confirmed');

    try {
      await fetch('/api/send-tip', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ signature: sig, campaignId: tipCampaign.$id, amount: String(amount), token: 'SOL' })
      });
    } catch (_) {}

    document.getElementById('tip-form-content').style.display = 'none';
    document.getElementById('tip-success-block').style.display = 'flex';
    showToast('FUD tipped! 🔥', 'good');

  } catch (err) {
    showToast(err.message || 'Tip failed', 'bad');
    btn.disabled = false;
    btn.textContent = 'Connect Wallet & Tip';
  }
}

let _solanaWeb3 = null;
function loadSolanaWeb3() {
  if (_solanaWeb3) return Promise.resolve(_solanaWeb3);
  return new Promise((resolve, reject) => {
    if (window.solanaWeb3) { _solanaWeb3 = window.solanaWeb3; return resolve(_solanaWeb3); }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.4/lib/index.iife.min.js';
    s.onload = () => { _solanaWeb3 = window.solanaWeb3; resolve(_solanaWeb3); };
    s.onerror = () => reject(new Error('Failed to load @solana/web3.js'));
    document.head.appendChild(s);
  });
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function init() {
  let user;
  try {
    user = await account.get();
  } catch (_) {
    window.location.replace('login.html');
    return;
  }

  document.getElementById('auth-spinner').style.display = 'none';
  document.getElementById('topbar').style.display = '';
  document.getElementById('main-content').style.display = '';
  document.getElementById('user-email').textContent = user.email;

  document.getElementById('sign-out-btn').addEventListener('click', async () => {
    try { await account.deleteSession('current'); } catch (_) {}
    window.location.replace('login.html');
  });

  document.getElementById('filters').addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    activeCat = pill.dataset.cat;
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p === pill));
    filterAndRender();
  });

  document.getElementById('modal-close-btn').addEventListener('click', closeTipModal);
  document.getElementById('tip-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('tip-modal')) closeTipModal();
  });

  renderSkeletons();

  try {
    const res = await databases.listDocuments(DB, COL, [
      Query.equal('active', true),
      Query.orderDesc('$createdAt'),
      Query.limit(50),
    ]);
    allCampaigns = res.documents;
    document.getElementById('count-badge').textContent = allCampaigns.length;
    filterAndRender();
  } catch (err) {
    document.getElementById('cards-grid').innerHTML = `
      <div class="empty-state">
        <h2>Couldn't load the FUD Feed.</h2>
        <p style="color:var(--bad);font-size:13px">${esc(err.message)}</p>
      </div>`;
    showToast('Failed to load campaigns', 'bad');
  }
}

init();
</script>
