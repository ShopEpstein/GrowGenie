name: Push Appwrite Collections

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - appwrite.config.json

jobs:
  push-collections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appwrite CLI
        run: npm install -g appwrite-cli

      - name: Configure CLI
        run: |
          appwrite client \
            --endpoint https://nyc.cloud.appwrite.io/v1 \
            --project-id 6a2bc15c00065b3c91a0 \
            --key ${{ secrets.APPWRITE_API_KEY }}

      - name: Create database (idempotent)
        run: |
          appwrite databases create \
            --database-id growthgenie \
            --name growthgenie \
            --enabled true || echo "Database may already exist, continuing..."

      - name: Push collections
        run: appwrite push collections --all --force
